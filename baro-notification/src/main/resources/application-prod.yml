server:
  port: ${SERVER_PORT:8090}

api:
  v1: /api/v1

spring:
  application:
    name: notification-service
  main:
    allow-bean-definition-overriding: true
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://baro-mysql:3306/${MYSQL_DATABASE:-baro_notification}?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true&useUnicode=true}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${MYSQL_USER:}
    password: ${MYSQL_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  mail:
    host: smtp.naver.com
    port: 465
    username: ${BARO_NOTI_MAIL_USERNAME:}
    password: ${BARO_NOTI_MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.ssl.enable: true
      mail.smtp.ssl.trust: smtp.naver.com
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    consumer:
      group-id: notification-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: latest

eureka:
  client:
    enabled: false

notification:
  delivery:
    kafka:
      topic: ${NOTIFICATION_DELIVERY_TOPIC:notification-events}
    fcm:
      enabled: false

management:
  endpoints:
    web:
      exposure:
        include: refresh, health, beans, info

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
