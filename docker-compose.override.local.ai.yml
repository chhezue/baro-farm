services:
  baro-ai:
    build:
      context: .
      dockerfile: docker/baro-ai/Dockerfile
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - SPRING_CONFIG_IMPORT=
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka:8761/eureka/
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=baro-kafka:29092
      - SPRING_ELASTICSEARCH_URIS=http://elasticsearch:9200
      - SPRING_AI_OPENAI_API_KEY=${SPRING_AI_OPENAI_API_KEY}
      - SPRING_AI_OPENAI_MODEL=${SPRING_AI_OPENAI_MODEL}
      - SPRING_AI_OPENAI_EMBEDDING_MODEL=${SPRING_AI_OPENAI_EMBEDDING_MODEL}
      - SPRING_MAIL_USERNAME=
      - SPRING_MAIL_PASSWORD=
      - MANAGEMENT_HEALTH_MAIL_ENABLED=false
      - AWS_ACCESS_KEY=
      - AWS_SECRET_KEY=
      - AWS_S3_BUCKET_NAME=
    volumes: []
