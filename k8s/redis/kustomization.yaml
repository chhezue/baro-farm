apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: baro-prod

resources:
  - deployment.yaml
  - service.yaml

labels:
  - includeSelectors: false  # selector는 immutable이므로 false로 설정
    includeTemplates: true
    pairs:
      app: redis
      component: cache

images:
  - name: redis
    newTag: 7.2-alpine
