apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-elasticsearch
  labels:
    app: my-elasticsearch
spec:
  replicas: 1
  selector:
    matchLabels:
      app: my-elasticsearch
  template:
    metadata:
      labels:
        app: my-elasticsearch
    spec:
      imagePullSecrets:
        - name: ecr-registry
      containers:
        - name: elasticsearch
          image: 299369991605.dkr.ecr.ap-northeast-2.amazonaws.com/baro-prod/elasticsearch-nori:latest
          ports:
            - name: http
              containerPort: 9200
            - name: transport
              containerPort: 9300
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          env:
            - name: ELASTICSEARCH_HEAP_SIZE
              value: "128m"
            - name: ELASTICSEARCH_CLUSTER_NAME
              value: "elastic"
            - name: ELASTICSEARCH_ENABLE_SECURITY
              value: "false"
          volumeMounts:
            - name: data
              mountPath: /bitnami/elasticsearch/data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: my-elasticsearch
  labels:
    app: my-elasticsearch
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 9200
      targetPort: http
    - name: transport
      port: 9300
      targetPort: transport
  selector:
    app: my-elasticsearch

