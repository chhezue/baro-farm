apiVersion: v1
kind: Service
metadata:
  name: my-elasticsearch
  labels:
    app: my-elasticsearch
spec:
  type: ClusterIP
  selector:
    app: my-elasticsearch
  ports:
    - name: http
      port: 9200
      targetPort: 9200
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: my-elasticsearch
  labels:
    app: my-elasticsearch
spec:
  serviceName: my-elasticsearch
  replicas: 1
  selector:
    matchLabels:
      app: my-elasticsearch
  template:
    metadata:
      labels:
        app: my-elasticsearch
    spec:
      containers:
        - name: elasticsearch
          image: docker.elastic.co/elasticsearch/elasticsearch:9.1.2
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9200
              name: http
          env:
            - name: discovery.type
              value: single-node
            - name: ES_JAVA_OPTS
              value: -Xms512m -Xmx512m
            - name: xpack.security.enabled
              value: "false"
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /usr/share/elasticsearch/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: gp3-ebs
        resources:
          requests:
            storage: 1Gi

