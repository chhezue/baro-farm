global:
  imagePullSecrets:
    - ecr-registry
  security:
    allowInsecureImages: true
  osShell:
    image:
      repository: 299369991605.dkr.ecr.ap-northeast-2.amazonaws.com/baro-prod/os-shell
      tag: latest

elasticsearch:
  fullnameOverride: my-elasticsearch

  # Use custom image with nori plugin (built from docker/elasticsearch/Dockerfile)
  image:
    repository: 299369991605.dkr.ecr.ap-northeast-2.amazonaws.com/baro-prod/elasticsearch-nori
    tag: latest
    pullPolicy: IfNotPresent

  master:
    # single node, not master-only so it can handle all roles
    masterOnly: false
    replicaCount: 1
    persistence:
      enabled: true
      storageClass: gp3-ebs
      size: 1Gi
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi

  data:
    replicaCount: 0

  # Override sysctl init container image to use ECR os-shell
  sysctlImage:
    enabled: true
    registry: 299369991605.dkr.ecr.ap-northeast-2.amazonaws.com
    repository: baro-prod/os-shell
    tag: latest

  ingest:
    replicaCount: 0

  coordinating:
    replicaCount: 0

  security:
    enabled: false

  metrics:
    enabled: false
