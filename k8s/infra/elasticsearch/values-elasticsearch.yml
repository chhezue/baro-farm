global:
  imageRegistry: public.ecr.aws
  security:
    allowInsecureImages: true

elasticsearch:
  fullnameOverride: my-elasticsearch

  # Install analysis-nori plugin for Korean text analyzer
  plugins:
    - analysis-nori

  # Ensure data and plugins directories are created with proper permissions
  volumePermissions:
    enabled: true

  master:
    masterOnly: false
    replicaCount: 1
    persistence:
      enabled: true
      storageClass: gp3-ebs
      size: 1Gi
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi

  data:
    replicaCount: 0

  ingest:
    replicaCount: 0

  coordinating:
    replicaCount: 0

  security:
    enabled: false

  metrics:
    enabled: false
