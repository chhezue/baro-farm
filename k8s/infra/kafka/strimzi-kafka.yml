apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: my-kafka
  namespace: kafka
spec:
  kafka:
    # Strimzi 0.41.0 supports Kafka 3.6.x / 3.7.x
    version: 3.7.0
    config:
      # Single-node KRaft (no ZooKeeper)
      node.id: 0
      process.roles: broker,controller
      controller.quorum.voters: "0@my-kafka-kafka-0.my-kafka-kafka-brokers.kafka.svc.cluster.local:9093"
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
      - name: controller
        port: 9093
        type: internal
        tls: false
        configuration:
          useServiceDnsDomain: true

  entityOperator:
    topicOperator: {}
    userOperator: {}
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaNodePool
metadata:
  name: my-kafka-pool
  namespace: kafka
  labels:
    strimzi.io/cluster: my-kafka
spec:
  replicas: 1
  roles:
    - broker
    - controller
  storage:
    type: ephemeral
  resources:
    requests:
      cpu: "50m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "768Mi"
