apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: my-kafka
  namespace: kafka
spec:
  kafka:
    # Strimzi 0.46.0+ supports only 4.x
    version: 4.1.1
    config:
      # KRaft (no ZooKeeper)
      node.id: 0
      process.roles: broker,controller
      controller.quorum.voters: "0@my-kafka-kafka-0.my-kafka-kafka-brokers.kafka.svc.cluster.local:9093"
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
      - name: controller
        port: 9093
        type: internal
        tls: false
        configuration:
          useServiceDnsDomain: true

  kafkaNodePools:
    - metadata:
        name: my-kafka-pool
      replicas: 1
      roles:
        - broker
        - controller
      storage:
        type: ephemeral

  entityOperator:
    topicOperator: {}
    userOperator: {}
