global:
  imageRegistry: public.ecr.aws
  security:
    allowInsecureImages: true

replicaCount: 1

listeners:
  client:
    protocol: PLAINTEXT
  interbroker:
    protocol: PLAINTEXT
  external:
    enabled: false

auth:
  clientProtocol: plaintext
  interBrokerProtocol: plaintext
  sasl:
    enabledMechanisms: []

persistence:
  enabled: true
  storageClass: gp3-ebs
  size: 2Gi

zookeeper:
  enabled: false
  replicaCount: 1
  persistence:
    enabled: true
    storageClass: gp3-ebs
    size: 1Gi

kraft:
  enabled: true

clusterId: ""
existingKraftSecret: ""
kraftVersion: 1

controller:
  replicaCount: 1

broker:
  replicaCount: 1

extraEnvVars:
  - name: KAFKA_CFG_LISTENERS
    value: PLAINTEXT://:9092,CONTROLLER://:9093
  - name: KAFKA_CFG_ADVERTISED_LISTENERS
    value: PLAINTEXT://my-kafka.kafka.svc.cluster.local:9092
