apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: baro-prod
  labels:
    app: gateway
    component: cloud
spec:
  type: NodePort  # 외부 접근을 위해 NodePort 사용 (EIP:30808로 접근 가능)
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30808  # NodePort 범위: 30000-32767
      protocol: TCP
      name: http
  selector:
    app: gateway

