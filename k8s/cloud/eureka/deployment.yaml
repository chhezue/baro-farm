apiVersion: apps/v1
kind: Deployment
metadata:
  name: eureka
  namespace: baro-prod
  labels:
    app: eureka
    component: cloud
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      app: eureka
  template:
    metadata:
      labels:
        app: eureka
        component: cloud
    spec:
      hostNetwork: true
      nodeSelector:
        kubernetes.io/hostname: ip-10-0-5-208  # 마스터 노드에 고정 배치
      tolerations:
        # Master node taint 허용 (master node 메모리 보호를 위한 taint가 설정된 경우)
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          # NoSchedule: 새로운 Pod는 스케줄링하지 않음 (이미 실행 중인 Pod는 유지)
          # PreferNoSchedule: 가능하면 스케줄링하지 않음 (부득이하면 허용)
          # NoExecute: 새로운 Pod는 스케줄링하지 않음 + 이미 실행 중인 Pod도 제거 가능
          effect: NoSchedule
      containers:
        - name: eureka
          image: ghcr.io/do-develop-space/eureka:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8761
              name: http
              protocol: TCP
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            # EUREKA_INSTANCE_HOSTNAME 제거: register-with-eureka=false이므로 불필요
            - name: JAVA_OPTS
              value: "-Xms64m -Xmx128m -Djava.net.preferIPv4Stack=true"
            - name: JAVA_TOOL_OPTIONS
              value: "-Xms64m -Xmx128m"
            - name: SERVER_ADDRESS
              value: "0.0.0.0"
          # resources:
          #   requests:
          #     memory: "128Mi"
          #     cpu: "100m"
          #   limits:
          #     memory: "256Mi"
          #     cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8761
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8761
            initialDelaySeconds: 40
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8761
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 20

