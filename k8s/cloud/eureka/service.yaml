apiVersion: v1
kind: Service
metadata:
  name: eureka
  namespace: baro-prod
  labels:
    app: eureka
    component: cloud
spec:
  type: ClusterIP  # hostNetwork: true를 사용하므로 직접 노드 IP:8761로 접근
  ports:
    - port: 8761
      targetPort: 8761
      protocol: TCP
      name: http
  selector:
    app: eureka

