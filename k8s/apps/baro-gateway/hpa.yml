apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: baro-gateway
  labels:
    app: baro-gateway
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: baro-gateway
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
