apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: baro-user
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - default
  selector:
    matchLabels:
      app: baro-user
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 30s
      scheme: http

