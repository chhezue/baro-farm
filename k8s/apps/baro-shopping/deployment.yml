apiVersion: apps/v1
kind: Deployment
metadata:
  name: baro-shopping
  labels:
    app: baro-shopping
spec:
  revisionHistoryLimit: 3
  replicas: 1
  selector:
    matchLabels:
      app: baro-shopping
  template:
    metadata:
      labels:
        app: baro-shopping
    spec:
      imagePullSecrets:
        - name: ecr-registry
      containers:
        - name: baro-shopping
          image: 299369991605.dkr.ecr.ap-northeast-2.amazonaws.com/baro-prod/baro-shopping:sha-df9a50e
          imagePullPolicy: Always
          ports:
            - containerPort: 8082
              name: http
          envFrom:
            - configMapRef:
                name: baro-shopping-config
            - configMapRef:
                name: infra-endpoints-config
          env:
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mysql-credentials
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-credentials
                  key: password
            - name: AWS_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: baro-shopping-secrets
                  key: AWS_ACCESS_KEY
            - name: AWS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: baro-shopping-secrets
                  key: AWS_SECRET_KEY
            - name: AWS_S3_BUCKET_NAME
              valueFrom:
                secretKeyRef:
                  name: baro-shopping-secrets
                  key: AWS_S3_BUCKET_NAME
            - name: MANAGEMENT_OTLP_TRACING_ENDPOINT
              value: http://otel-collector.monitoring.svc.cluster.local:4318/v1/traces
            - name: MANAGEMENT_TRACING_SAMPLING_PROBABILITY
              value: "1.0"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
