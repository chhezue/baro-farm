apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: baro-prod

resources:
  - deployment.yaml
  - service.yaml

labels:
  - includeSelectors: true
    includeTemplates: true
    pairs:
      app: baro-support
      component: app

images:
  - name: ghcr.io/do-develop-space/baro-support
    newTag: latest
