apiVersion: apps/v1
kind: Deployment
metadata:
  name: baro-support
  namespace: baro-prod
  labels:
    app: baro-support
    component: app
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0  # hostNetwork мВђмЪ© мЛЬ нПђнКЄ мґ©лПМ л∞©мІА
      maxUnavailable: 1
  selector:
    matchLabels:
      app: baro-support
  template:
    metadata:
      labels:
        app: baro-support
        component: app
    spec:
      hostNetwork: true  # k8s мДЬлєДмК§мЭШ м†СкЈЉмЭД мЬДнХі нХДмЪФ. Data мДЬлєДмК§лКФ Data EC2 IPл°Ь м†СкЈЉ
      # Worker node м†ДмЪ© taint нЧИмЪ© (master nodeмЭШ мЛЬмК§нЕЬ PodлУ§мЭі worker nodeмЧР мК§мЉАм§ДлІБлРШмІА мХКлПДл°Э)
      tolerations:
        - key: dedicated
          operator: Equal
          value: worker
          # NoSchedule: мГИл°ЬмЪі PodлКФ мК§мЉАм§ДлІБнХШмІА мХКмЭМ (мЭілѓЄ мЛ§нЦЙ м§СмЭЄ PodлКФ мЬ†мІА)
          # PreferNoSchedule: к∞АлК•нХШл©і мК§мЉАм§ДлІБнХШмІА мХКмЭМ (лґАлУЭмЭінХШл©і нЧИмЪ©)
          # NoExecute: мГИл°ЬмЪі PodлКФ мК§мЉАм§ДлІБнХШмІА мХКмЭМ + мЭілѓЄ мЛ§нЦЙ м§СмЭЄ PodлПД м†Ьк±∞ к∞АлК•
          effect: NoSchedule
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
      containers:
        - name: baro-support
          image: ghcr.io/do-develop-space/baro-support:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8089
              name: http
              protocol: TCP
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            - name: SPRING_APPLICATION_NAME
              value: "support-service"  # Eureka лУ±л°Эл™Е (мЖМлђЄмЮРл°Ь нЖµмЭЉ)
            - name: SERVER_PORT
              value: "8089"  # Config Server мД§м†Х лНЃмЦімУ∞кЄ∞ л∞©мІА
            - name: SPRING_CONFIG_IMPORT
              value: "optional:configserver:http://localhost:8888"  # л∞∞нПђ мК§нБђл¶љнКЄк∞А мЮРлПЩмЬЉл°Ь Data EC2 IPл°Ь мєШнЩШ (Cloud л™®лУИмЭі Data EC2мЧРмДЬ мЛ§нЦЙлР®)
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: "http://localhost:8761/eureka/"  # л∞∞нПђ мК§нБђл¶љнКЄк∞А мЮРлПЩмЬЉл°Ь Data EC2 IPл°Ь мєШнЩШ (Cloud л™®лУИмЭі Data EC2мЧРмДЬ мЛ§нЦЙлР®)
            - name: JAVA_OPTS
              value: "-Xms256m -Xmx512m"
            # MySQL мД§м†Х
            - name: MYSQL_DATABASE
              value: "barosupport"
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: baro-secrets
                  key: MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: baro-secrets
                  key: MYSQL_PASSWORD
            # MySQL нШЄмК§нКЄ (Data EC2 Private IP)
            # мЛ§м†Ь л∞∞нПђ мЛЬ deploy-k8s.sh мК§нБђл¶љнКЄк∞А мЮРлПЩмЬЉл°Ь Data EC2 IPл°Ь мєШнЩШ
            - name: EC2_IP
              value: "CHANGE_ME_TO_EC2_IP"  # л∞∞нПђ мК§нБђл¶љнКЄк∞А мЮРлПЩмЬЉл°Ь Data EC2 IPл°Ь мєШнЩШ
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://CHANGE_ME_TO_EC2_IP:3306/barosupport?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true&useUnicode=true"
            # Kafka мД§м†Х (Data EC2 - Public EC2)
            # DEPLOY_KAFKA == false мЭЉ лХМ localhost:29092 мВђмЪ©
            # DEPLOY_KAFKA == true мЭЉ лХМ CHANGE_ME_TO_EC2_IP:29092 мВђмЪ©
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              # value: "CHANGE_ME_TO_EC2_IP:29092"  # л∞∞нПђ мК§нБђл¶љнКЄк∞А мЮРлПЩмЬЉл°Ь Data EC2 IPл°Ь мєШнЩШ
              value: "http://localhost:29092" # ElasticsearchлКФ к∞ЩмЭА Private EC2мЧР docker-composeл°Ь мЛ§нЦЙлР®

            # Elasticsearch мД§м†Х (Private EC2 - hostNetwork мВђмЪ©мЬЉл°Ь localhost м†СкЈЉ)
            # DEPLOY_ELASTICSEARCH == false мЭЉ лХМ localhost:9200 мВђмЪ©
            # DEPLOY_ELASTICSEARCH == true мЭЉ лХМ CHANGE_ME_TO_EC2_IP:9200 мВђмЪ©
            - name: SPRING_ELASTICSEARCH_URIS
              value: "CHANGE_ME_TO_EC2_IP:9200"  # л∞∞нПђ мК§нБђл¶љнКЄк∞А мЮРлПЩмЬЉл°Ь Data EC2 IPл°Ь мєШнЩШ
              # value: "http://localhost:9200"  # ElasticsearchлКФ к∞ЩмЭА Private EC2мЧР docker-composeл°Ь мЛ§нЦЙлР®
            # AWS мД§м†Х
            - name: AWS_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: baro-secrets
                  key: AWS_ACCESS_KEY
            - name: AWS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: baro-secrets
                  key: AWS_SECRET_KEY
            - name: AWS_S3_BUCKET_NAME
              valueFrom:
                secretKeyRef:
                  name: baro-secrets
                  key: AWS_S3_BUCKET_NAME
            # мЭіл©ФмЭЉ мД§м†Х
            - name: SPRING_MAIL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: baro-secrets
                  key: SPRING_MAIL_USERNAME
            - name: SPRING_MAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: baro-secrets
                  key: SPRING_MAIL_PASSWORD
          # resources:
          #   requests:
          #     memory: "512Mi"
          #     cpu: "200m"
          #   limits:
          #     memory: "768Mi"
          #     cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8089
              scheme: HTTP
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8089
              scheme: HTTP
            initialDelaySeconds: 90
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8089
              scheme: HTTP
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 30

