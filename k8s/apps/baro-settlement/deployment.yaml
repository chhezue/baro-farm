apiVersion: apps/v1
kind: Deployment
metadata:
  name: baro-settlement
  namespace: baro-prod
  labels:
    app: baro-settlement
    component: app
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: baro-settlement
  template:
    metadata:
      labels:
        app: baro-settlement
        component: app
    spec:
      tolerations:
        - key: dedicated
          operator: Equal
          value: worker
          effect: NoSchedule
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
      securityContext:
        fsGroup: 1001
      containers:
        - name: baro-settlement
          image: ghcr.io/do-develop-space/baro-settlement:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8090
              name: http
              protocol: TCP
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            - name: SPRING_APPLICATION_NAME
              value: "settlement-service"
            - name: SERVER_PORT
              value: "8090"
            - name: SETTLEMENT_SCHEDULER_ENABLED
              value: "false"
            - name: SPRING_CONFIG_IMPORT
              value: "optional:configserver:http://config:8888"
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: "http://eureka:8761/eureka/"
            - name: JAVA_TOOL_OPTIONS
              value: >
                -Duser.timezone=Asia/Seoul
                -Xms64m
                -Xmx128m
                -XX:MaxMetaspaceSize=128m
                -XX:CompressedClassSpaceSize=64m
                -XX:MaxDirectMemorySize=32m
                -XX:ReservedCodeCacheSize=24m
                -XX:NativeMemoryTracking=summary
            - name: MYSQL_DATABASE
              value: "barosettlement"
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: baro-secrets
                  key: MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: baro-secrets
                  key: MYSQL_PASSWORD
            - name: EC2_IP
              value: "CHANGE_ME_TO_EC2_IP"
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: baro-secrets
                  key: SPRING_DATASOURCE_SETTLEMENT_URL
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: "CHANGE_ME_TO_EC2_IP:29092"
            - name: SPRING_DATA_REDIS_HOST
              value: "CHANGE_ME_TO_EC2_IP"
            - name: SPRING_DATA_REDIS_PORT
              value: "6379"
            - name: SPRING_DATA_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: baro-secrets
                  key: REDIS_PASSWORD
            - name: LOG_DIR
              value: "/mnt/s3/logs/settlement"
          volumeMounts:
            - name: log-volume
              mountPath: /mnt/s3/logs/settlement
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8090
              scheme: HTTP
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8090
              scheme: HTTP
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8090
              scheme: HTTP
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 20
      volumes:
        - name: log-volume
          hostPath:
            path: /mnt/s3/logs/settlement
            type: DirectoryOrCreate
