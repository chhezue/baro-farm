apiVersion: apps/v1
kind: Deployment
metadata:
  name: baro-order
  namespace: baro-prod
  labels:
    app: baro-order
    component: app
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0  # hostNetwork 사용 시 포트 충돌 방지
      maxUnavailable: 1
  selector:
    matchLabels:
      app: baro-order
  template:
    metadata:
      labels:
        app: baro-order
        component: app
    spec:
      hostNetwork: true  # k8s 서비스의 접근을 위해 필요. Data 서비스는 Data EC2 IP로 접근
      # Worker node 전용 taint 허용 (master node의 시스템 Pod들이 worker node에 스케줄링되지 않도록)
      tolerations:
        - key: dedicated
          operator: Equal
          value: worker
          # NoSchedule: 새로운 Pod는 스케줄링하지 않음 (이미 실행 중인 Pod는 유지)
          # PreferNoSchedule: 가능하면 스케줄링하지 않음 (부득이하면 허용)
          # NoExecute: 새로운 Pod는 스케줄링하지 않음 + 이미 실행 중인 Pod도 제거 가능
          effect: NoSchedule
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
      securityContext:
        fsGroup: 1001  # 로그 디렉토리 소유권 설정 (1001:1001)
      initContainers:
        - name: init-log-dir
          image: busybox:1.36
          command: ['sh', '-c']
          args:
            - |
              mkdir -p /mnt/s3/order
              chown -R 1001:1001 /mnt/s3/order
              chmod -R 755 /mnt/s3/order
          securityContext:
            runAsUser: 0  # root 권한 필요
          volumeMounts:
            - name: log-volume
              mountPath: /mnt/s3/order
      containers:
        - name: baro-order
          image: ghcr.io/do-develop-space/baro-order:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8087
              name: http
              protocol: TCP
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            - name: SPRING_APPLICATION_NAME
              value: "order-service"  # Eureka 등록명 (소문자로 통일)
            - name: SERVER_PORT
              value: "8087"  # Config Server 설정 덮어쓰기 방지
            - name: SPRING_CONFIG_IMPORT
              value: "optional:configserver:http://localhost:8888"  # 배포 스크립트가 자동으로 Data EC2 IP로 치환 (Cloud 모듈이 Data EC2에서 실행됨)
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: "http://localhost:8761/eureka/"  # 배포 스크립트가 자동으로 Data EC2 IP로 치환 (Cloud 모듈이 Data EC2에서 실행됨)
            - name: JAVA_OPTS
              value: "-Xms64m -Xmx128m"
            - name: JAVA_TOOL_OPTIONS
              value: >
                -Duser.timezone=Asia/Seoul
                -Xms64m
                -Xmx128m
                -XX:MaxMetaspaceSize=128m
                -XX:CompressedClassSpaceSize=64m
                -XX:MaxDirectMemorySize=32m
                -XX:ReservedCodeCacheSize=24m
                -XX:NativeMemoryTracking=summary
            # MySQL 설정
            - name: MYSQL_DATABASE
              value: "baroorder"
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: baro-secrets
                  key: MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: baro-secrets
                  key: MYSQL_PASSWORD
            # MySQL 호스트 (Data EC2 Private IP)
            # 실제 배포 시 deploy-k8s.sh 스크립트가 자동으로 Data EC2 IP로 치환
            - name: EC2_IP
              value: "CHANGE_ME_TO_EC2_IP"  # 배포 스크립트가 자동으로 Data EC2 IP로 치환
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://CHANGE_ME_TO_EC2_IP:3306/baroorder?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true&useUnicode=true"
            # Kafka 설정 (Data EC2 - Public EC2)
            # DEPLOY_KAFKA == false 일 때 localhost:29092 사용
            # DEPLOY_KAFKA == true 일 때 Public EC2에 배포되므로 CHANGE_ME_TO_EC2_IP:29092 사용
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: "CHANGE_ME_TO_EC2_IP:29092"  # 배포 스크립트가 자동으로 Public EC2 IP로 치환
              # value: "http://localhost:29092" # Kafka는 같은 Private EC2에 docker-compose로 실행됨
            # Toss Payments 설정
            - name: TOSS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: baro-secrets
                  key: TOSS_SECRET_KEY
            # AWS 설정
            - name: AWS_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: baro-secrets
                  key: AWS_ACCESS_KEY
            - name: AWS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: baro-secrets
                  key: AWS_SECRET_KEY
            - name: AWS_S3_BUCKET_NAME
              valueFrom:
                secretKeyRef:
                  name: baro-secrets
                  key: AWS_S3_BUCKET_NAME
            # 로그 디렉토리 설정
            - name: LOG_DIR
              value: "/mnt/s3/order"
          volumeMounts:
            - name: log-volume
              mountPath: /mnt/s3/order
          # resources:
          #   requests:
          #     cpu: "100m"
          #     memory: "256Mi"
          #   limits:
          #     cpu: "500m"
          #     memory: "416Mi"  # 실제 RSS: 336MB
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8087
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8087
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8087
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 20
      volumes:
        - name: log-volume
          hostPath:
            path: /mnt/s3/order
            type: DirectoryOrCreate

