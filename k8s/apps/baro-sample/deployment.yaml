apiVersion: apps/v1
kind: Deployment
metadata:
  name: baro-sample
  labels:
    app: baro-sample
spec:
  replicas: 1
  selector:
    matchLabels:
      app: baro-sample
  template:
    metadata:
      labels:
        app: baro-sample
    spec:
      imagePullSecrets:
        - name: ecr-registry
      containers:
        - name: baro-sample
          image: 299369991605.dkr.ecr.ap-northeast-2.amazonaws.com/baro-prod/baro-sample:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8090
              name: http