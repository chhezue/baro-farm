apiVersion: v1
kind: ConfigMap
metadata:
  name: baro-sample-config
data:
  SPRING_PROFILES_ACTIVE: "prod"
  SERVER_PORT: "8090"
  SPRING_DATASOURCE_URL: "jdbc:mysql://my-mysql.db.svc.cluster.local:3306/baro_db"
  REDIS_HOST: "my-redis-master.cache.svc.cluster.local"
  REDIS_PORT: "6379"
  KAFKA_BOOTSTRAP_SERVERS: "my-kafka-kafka-bootstrap.kafka.svc.cluster.local:9092"
  ELASTICSEARCH_URIS: "http://my-elasticsearch.search.svc.cluster.local:9200"

