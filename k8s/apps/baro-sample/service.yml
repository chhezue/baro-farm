apiVersion: v1
kind: Service
metadata:
  name: baro-sample
  labels:
    app: baro-sample
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: "/actuator/prometheus"
    prometheus.io/port: "8080"
spec:
  type: NodePort
  selector:
    app: baro-sample
  ports:
    - port: 8080
      targetPort: 8090
      nodePort: 30080
      protocol: TCP
      name: http
