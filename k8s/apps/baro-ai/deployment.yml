apiVersion: apps/v1
kind: Deployment
metadata:
  name: baro-ai
  labels:
    app: baro-ai
spec:
  revisionHistoryLimit: 3
  replicas: 1
  selector:
    matchLabels:
      app: baro-ai
  template:
    metadata:
      labels:
        app: baro-ai
    spec:
      imagePullSecrets:
        - name: ecr-registry
      containers:
        - name: baro-ai
          image: 299369991605.dkr.ecr.ap-northeast-2.amazonaws.com/baro-prod/baro-ai:sha-df9a50e
          imagePullPolicy: Always
          ports:
            - containerPort: 8092
              name: http
          envFrom:
            - configMapRef:
                name: baro-ai-config
            - configMapRef:
                name: infra-endpoints-config
          env:
            - name: SPRING_CLOUD_CONFIG_ENABLED
              value: "false"
            - name: SPRING_CLOUD_CONFIG_IMPORT_CHECK_ENABLED
              value: "false"
            - name: BARO_AI_OPENAI_KEY
              valueFrom:
                secretKeyRef:
                  name: baro-ai-secrets
                  key: BARO_AI_OPENAI_KEY
            - name: MANAGEMENT_OTLP_TRACING_ENDPOINT
              value: http://otel-collector.monitoring.svc.cluster.local:4318/v1/traces
            - name: MANAGEMENT_TRACING_SAMPLING_PROBABILITY
              value: "1.0"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
