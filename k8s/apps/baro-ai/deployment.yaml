apiVersion: apps/v1
kind: Deployment
metadata:
  name: baro-ai
  namespace: baro-prod
  labels:
    app: baro-ai
    component: app
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0  # hostNetwork ВѓгВџЕ ВІю ьЈгьіИ ВХЕвЈї в░ЕВДђ
      maxUnavailable: 1
  selector:
    matchLabels:
      app: baro-ai
  template:
    metadata:
      labels:
        app: baro-ai
        component: app
    spec:
      hostNetwork: true  # k8s Вёюв╣ёВіцВЮў ВаЉЖи╝ВЮё ВюёьЋ┤ ьЋёВџћ. Data Вёюв╣ёВіцвіћ Data EC2 IPвАю ВаЉЖи╝
      # Worker node ВаёВџЕ taint ьЌѕВџЕ (master nodeВЮў ВІюВіцьЁю PodвЊцВЮ┤ worker nodeВЌљ ВіцВ╝ђВцёвДЂвљўВДђ ВЋівЈёвАЮ)
      tolerations:
        - key: dedicated
          operator: Equal
          value: worker
          # NoSchedule: ВЃѕвАюВџ┤ Podвіћ ВіцВ╝ђВцёвДЂьЋўВДђ ВЋіВЮї (ВЮ┤в»И ВІцьќЅ ВцЉВЮИ Podвіћ ВюаВДђ)
          # PreferNoSchedule: Ж░ђвіЦьЋўвЕ┤ ВіцВ╝ђВцёвДЂьЋўВДђ ВЋіВЮї (вХђвЊЮВЮ┤ьЋўвЕ┤ ьЌѕВџЕ)
          # NoExecute: ВЃѕвАюВџ┤ Podвіћ ВіцВ╝ђВцёвДЂьЋўВДђ ВЋіВЮї + ВЮ┤в»И ВІцьќЅ ВцЉВЮИ PodвЈё ВаюЖ▒░ Ж░ђвіЦ
          effect: NoSchedule
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
      securityContext:
        fsGroup: 1001  # вАюЖиИ вћћваЅьєавдг ВєїВюаЖХї ВёцВаЋ (1001:1001)
      containers:
        - name: baro-ai
          image: ghcr.io/do-develop-space/baro-ai:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8092
              name: http
              protocol: TCP
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            - name: SPRING_APPLICATION_NAME
              value: "ai-service"  # Eureka вЊ▒вАЮвфЁ (ВєївгИВъљвАю ьєхВЮ╝)
            - name: SERVER_PORT
              value: "8092"  # Config Server ВёцВаЋ вЇ«Вќ┤ВЊ░ЖИ░ в░ЕВДђ
            - name: SPRING_CONFIG_IMPORT
              value: "optional:configserver:http://localhost:8888"  # в░░ьЈг ВіцьЂгвдйьіИЖ░ђ ВъљвЈЎВю╝вАю Data EC2 IPвАю В╣ўьЎў (Cloud вфевЊѕВЮ┤ Data EC2ВЌљВёю ВІцьќЅвље)
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: "http://localhost:8761/eureka/"  # в░░ьЈг ВіцьЂгвдйьіИЖ░ђ ВъљвЈЎВю╝вАю Data EC2 IPвАю В╣ўьЎў (Cloud вфевЊѕВЮ┤ Data EC2ВЌљВёю ВІцьќЅвље)
            - name: JAVA_TOOL_OPTIONS
              value: >
                -Duser.timezone=Asia/Seoul
                -Xms64m
                -Xmx96m
                -XX:MaxMetaspaceSize=96m
                -XX:CompressedClassSpaceSize=48m
                -XX:MaxDirectMemorySize=32m
                -XX:ReservedCodeCacheSize=24m
                -XX:NativeMemoryTracking=summary
                -XX:+UseG1GC
                -XX:MaxGCPauseMillis=200
            # ВІцВаю в░░ьЈг ВІю deploy-k8s.sh ВіцьЂгвдйьіИЖ░ђ ВъљвЈЎВю╝вАю Data EC2 IPвАю В╣ўьЎў
            - name: EC2_IP
              value: "CHANGE_ME_TO_EC2_IP"  # в░░ьЈг ВіцьЂгвдйьіИЖ░ђ ВъљвЈЎВю╝вАю Data EC2 IPвАю В╣ўьЎў
            # - name: SPRING_DATASOURCE_URL
              # value: "jdbc:mysql://CHANGE_ME_TO_EC2_IP:3306/baroai?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true&useUnicode=true"
            # Kafka ВёцВаЋ (Data EC2 - Public EC2)
            # DEPLOY_KAFKA == false ВЮ╝ вЋї localhost:29092 ВѓгВџЕ
            # DEPLOY_KAFKA == true ВЮ╝ вЋї Public EC2ВЌљ в░░ьЈгвљўв»ђвАю CHANGE_ME_TO_EC2_IP:29092 ВѓгВџЕ
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: "CHANGE_ME_TO_EC2_IP:29092"  # в░░ьЈг ВіцьЂгвдйьіИЖ░ђ ВъљвЈЎВю╝вАю Public EC2 IPвАю В╣ўьЎў
              # value: "http://localhost:29092" # Kafkaвіћ Ж░ЎВЮђ Private EC2ВЌљ docker-composeвАю ВІцьќЅвље
            # Elasticsearch ВёцВаЋ (Data EC2 - Public EC2)
            # DEPLOY_ELASTICSEARCH == true ВЮ╝ вЋї Public EC2ВЌљ в░░ьЈгвљўв»ђвАю CHANGE_ME_TO_EC2_IP:9200 ВѓгВџЕ
            - name: SPRING_ELASTICSEARCH_URIS
              value: "CHANGE_ME_TO_EC2_IP:9200"  # в░░ьЈг ВіцьЂгвдйьіИЖ░ђ ВъљвЈЎВю╝вАю Public EC2 IPвАю В╣ўьЎў
              # value: "http://localhost:9200"  # Elasticsearchвіћ Ж░ЎВЮђ Private EC2ВЌљ docker-composeвАю ВІцьќЅвље
            # Redis ВёцВаЋ
            - name: SPRING_DATA_REDIS_HOST
              value: "CHANGE_ME_TO_EC2_IP"
            - name: SPRING_DATA_REDIS_PORT
              value: "6379"
            - name: SPRING_DATA_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: baro-secrets
                  key: REDIS_PASSWORD
            # AWS ВёцВаЋ
            - name: AWS_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: baro-secrets
                  key: AWS_ACCESS_KEY
            - name: AWS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: baro-secrets
                  key: AWS_SECRET_KEY
            - name: AWS_S3_BUCKET_NAME
              valueFrom:
                secretKeyRef:
                  name: baro-secrets
                  key: AWS_S3_BUCKET_NAME
            # ВЮ┤вЕћВЮ╝ ВёцВаЋ
            - name: SPRING_MAIL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: baro-secrets
                  key: SPRING_MAIL_USERNAME
            - name: SPRING_MAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: baro-secrets
                  key: SPRING_MAIL_PASSWORD
            # OpenAI API ьѓц ВёцВаЋ
            - name: SPRING_AI_OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: baro-secrets
                  key: SPRING_AI_OPENAI_API_KEY
            # вАюЖиИ вћћваЅьєавдг ВёцВаЋ
            - name: LOG_DIR
              value: "/mnt/s3/logs/ai"
          volumeMounts:
            - name: log-volume
              mountPath: /mnt/s3/logs/ai
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8092
              scheme: HTTP
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8092
              scheme: HTTP
            initialDelaySeconds: 90
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8092
              scheme: HTTP
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 30
      volumes:
        - name: log-volume
          hostPath:
            path: /mnt/s3/logs/ai
            type: DirectoryOrCreate

