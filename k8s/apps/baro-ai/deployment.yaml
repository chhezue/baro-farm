apiVersion: apps/v1
kind: Deployment
metadata:
  name: baro-ai
  namespace: baro-prod
  labels:
    app: baro-ai
    component: app
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0  # hostNetwork 사용 시 포트 충돌 방지
      maxUnavailable: 1
  selector:
    matchLabels:
      app: baro-ai
  template:
    metadata:
      labels:
        app: baro-ai
        component: app
    spec:
      # Worker node 전용 taint 허용 (master node의 시스템 Pod들이 worker node에 스케줄링되지 않도록)
      tolerations:
        - key: dedicated
          operator: Equal
          value: worker
          # NoSchedule: 새로운 Pod는 스케줄링하지 않음 (이미 실행 중인 Pod는 유지)
          # PreferNoSchedule: 가능하면 스케줄링하지 않음 (부득이하면 허용)
          # NoExecute: 새로운 Pod는 스케줄링하지 않음 + 이미 실행 중인 Pod도 제거 가능
          effect: NoSchedule
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
      securityContext:
        fsGroup: 1001  # 로그 디렉토리 소유권 설정 (1001:1001)
      containers:
        - name: baro-ai
          image: ghcr.io/do-develop-space/baro-ai:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8092
              name: http
              protocol: TCP
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            - name: SPRING_APPLICATION_NAME
              value: "ai-service"  # Eureka 등록명 (소문자로 통일)
            - name: SERVER_PORT
              value: "8092"  # Config Server 설정 덮어쓰기 방지
            - name: SPRING_CONFIG_IMPORT
              value: "optional:configserver:http://config:8888"  # 배포 스크립트가 자동으로 Data EC2 IP로 치환 (Cloud 모듈이 Data EC2에서 실행됨)
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: "http://eureka:8761/eureka/"  # 배포 스크립트가 자동으로 Data EC2 IP로 치환 (Cloud 모듈이 Data EC2에서 실행됨)
            - name: JAVA_TOOL_OPTIONS
              value: >
                -Duser.timezone=Asia/Seoul
                -Xms64m
                -Xmx96m
                -XX:MaxMetaspaceSize=96m
                -XX:CompressedClassSpaceSize=48m
                -XX:MaxDirectMemorySize=32m
                -XX:ReservedCodeCacheSize=24m
                -XX:NativeMemoryTracking=summary
                -XX:+UseG1GC
                -XX:MaxGCPauseMillis=200
            # 실제 배포 시 deploy-k8s.sh 스크립트가 자동으로 Data EC2 IP로 치환
            - name: EC2_IP
              value: "CHANGE_ME_TO_EC2_IP"  # 배포 스크립트가 자동으로 Data EC2 IP로 치환
            # - name: SPRING_DATASOURCE_URL
              # value: "jdbc:mysql://CHANGE_ME_TO_EC2_IP:3306/baroai?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true&useUnicode=true"
            # Kafka 설정 (Data EC2 - Public EC2)
            # DEPLOY_KAFKA == false 일 때 localhost:29092 사용
            # DEPLOY_KAFKA == true 일 때 Public EC2에 배포되므로 CHANGE_ME_TO_EC2_IP:29092 사용
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: "CHANGE_ME_TO_EC2_IP:29092"  # 배포 스크립트가 자동으로 Public EC2 IP로 치환
              # value: "http://localhost:29092" # Kafka는 같은 Private EC2에 docker-compose로 실행됨
            # Elasticsearch 설정 (Data EC2 - Public EC2)
            # DEPLOY_ELASTICSEARCH == true 일 때 Public EC2에 배포되므로 CHANGE_ME_TO_EC2_IP:9200 사용
            - name: SPRING_ELASTICSEARCH_URIS
              value: "CHANGE_ME_TO_EC2_IP:9200"  # 배포 스크립트가 자동으로 Public EC2 IP로 치환
              # value: "http://localhost:9200"  # Elasticsearch는 같은 Private EC2에 docker-compose로 실행됨
            # Redis 설정
            - name: SPRING_DATA_REDIS_HOST
              value: "CHANGE_ME_TO_EC2_IP"
            - name: SPRING_DATA_REDIS_PORT
              value: "6379"
            - name: SPRING_DATA_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: baro-secrets
                  key: REDIS_PASSWORD
            # AWS 설정
            - name: AWS_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: baro-secrets
                  key: AWS_ACCESS_KEY
            - name: AWS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: baro-secrets
                  key: AWS_SECRET_KEY
            - name: AWS_S3_BUCKET_NAME
              valueFrom:
                secretKeyRef:
                  name: baro-secrets
                  key: AWS_S3_BUCKET_NAME
            # 이메일 설정
            - name: SPRING_MAIL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: baro-secrets
                  key: SPRING_MAIL_USERNAME
            - name: SPRING_MAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: baro-secrets
                  key: SPRING_MAIL_PASSWORD
            # OpenAI API 키 설정
            - name: SPRING_AI_OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: baro-secrets
                  key: SPRING_AI_OPENAI_API_KEY
            # OpenAI 모델 설정
            - name: SPRING_AI_OPENAI_MODEL
              value: "gpt-4o-mini"
            - name: SPRING_AI_OPENAI_EMBEDDING_MODEL
              value: "text-embedding-3-small"
            # 제철 판단 RAG 설정
            - name: SEASONALITY_RAG_ENABLED
              value: "true"
            - name: SEASONALITY_CSV_PATH
              value: "/mnt/s3/dataset/season/seasonality-data.csv"
            # 로그 디렉토리 설정
            - name: LOG_DIR
              value: "/mnt/s3/logs/ai"
          volumeMounts:
            - name: log-volume
              mountPath: /mnt/s3/logs/ai
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8092
              scheme: HTTP
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8092
              scheme: HTTP
            initialDelaySeconds: 90
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8092
              scheme: HTTP
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 30
      volumes:
        - name: log-volume
          hostPath:
            path: /mnt/s3/logs/ai
            type: DirectoryOrCreate

