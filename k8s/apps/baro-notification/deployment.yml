apiVersion: apps/v1
kind: Deployment
metadata:
  name: baro-notification
  labels:
    app: baro-notification
spec:
  revisionHistoryLimit: 3
  replicas: 1
  selector:
    matchLabels:
      app: baro-notification
  template:
    metadata:
      labels:
        app: baro-notification
    spec:
      imagePullSecrets:
        - name: ecr-registry
      containers:
        - name: baro-notification
          image: 299369991605.dkr.ecr.ap-northeast-2.amazonaws.com/baro-prod/baro-notification:sha-d4d7052
          imagePullPolicy: Always
          ports:
            - containerPort: 8091
              name: http
          envFrom:
            - configMapRef:
                name: baro-notification-config
            - configMapRef:
                name: infra-endpoints-config
          env:
            - name: SPRING_CLOUD_CONFIG_ENABLED
              value: "false"
            - name: SPRING_CLOUD_CONFIG_IMPORT_CHECK_ENABLED
              value: "false"
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mysql-credentials
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-credentials
                  key: password
            - name: BARO_NOTI_MAIL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: baro-notification-secrets
                  key: BARO_NOTI_MAIL_USERNAME
            - name: BARO_NOTI_MAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: baro-notification-secrets
                  key: BARO_NOTI_MAIL_PASSWORD
            - name: MANAGEMENT_OTLP_TRACING_ENDPOINT
              value: http://otel-collector.monitoring.svc.cluster.local:4318/v1/traces
            - name: MANAGEMENT_TRACING_SAMPLING_PROBABILITY
              value: "1.0"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
