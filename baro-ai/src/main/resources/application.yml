server:
  port: ${SERVER_PORT:8092}  # 환경 변수로 오버라이드 가능 (Config Server 설정 덮어쓰기 방지)

api:
  v1: /api/v1

spring:
  application:
    name: ai-service
  config:
    import: ${SPRING_CONFIG_IMPORT:optional:configserver:http://config:8888}
  main:
    allow-bean-definition-overriding: true
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.ai.autoconfigure.vectorstore.elasticsearch.ElasticsearchVectorStoreAutoConfiguration

  # Elasticsearch 설정
  elasticsearch:
    uris: ${SPRING_ELASTICSEARCH_URIS:http://elasticsearch:9200}

  # Kafka 설정
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    consumer:
      group-id: ai-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: latest  # earliest에서 latest로 변경하여 오래된 메시지 건너뛰기
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  # Spring AI 설정
  ai:
    openai:
      api-key: ${SPRING_AI_OPENAI_API_KEY:}
      chat:
        options:
          model: ${SPRING_AI_OPENAI_MODEL:gpt-4o-mini}
          temperature: 0.7
      embedding:
        options:
          model: ${SPRING_AI_OPENAI_EMBEDDING_MODEL:text-embedding-3-small}
    ollama:
      base-url: ${SPRING_AI_OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          model: ${SPRING_AI_OLLAMA_MODEL:llama3}

eureka:
  client:
    # Eureka 서버에 등록 (Config Server의 eureka-server 설정과 충돌 방지)
    register-with-eureka: true
    fetch-registry: true
    service-url:
      # Docker 환경에서는 서비스 이름(eureka) 사용, 로컬에서는 localhost 사용
      # 환경 변수 EUREKA_CLIENT_SERVICEURL_DEFAULTZONE으로 오버라이드 가능
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://eureka:8761/eureka/}
  instance:
    prefer-ip-address: true

# 로깅 설정
logging:
  level:
    root: INFO
    com.barofarm.ai: DEBUG
    org.springframework.web: DEBUG
    org.springframework.web.servlet.DispatcherServlet: DEBUG
    org.springframework.kafka: INFO  # Kafka 로깅 적절히
    org.elasticsearch: DEBUG  # Elasticsearch 디버깅
    org.springframework.ai: DEBUG  # Spring AI 디버깅

# Swagger/OpenAPI 설정
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  default-consumes-media-type: application/json
  default-produces-media-type: application/json

management:
  endpoints:
    web:
      exposure:
        include: "*"  # 모든 Actuator 엔드포인트 노출
  endpoint:
    health:
      show-details: always
      enabled: true
  health:
    elasticsearch:
      enabled: false  # Elasticsearch Java client 8.13.3과 호환성 문제로 비활성화

# 제철 판단 RAG 설정
seasonality:
  rag:
    enabled: ${SEASONALITY_RAG_ENABLED:true}  # RAG 활성화 여부 (기본: true, 최적화 적용)
    max-results: ${SEASONALITY_RAG_MAX_RESULTS:1}  # 검색 결과 최대 개수 (최적화: 3 → 1)
    compact-format: ${SEASONALITY_RAG_COMPACT_FORMAT:true}  # 간결한 형식 사용 (제철 값만, 토큰 절감)
  csv:
    path: ${SEASONALITY_CSV_PATH:/mnt/s3/dataset/season/seasonality-data.csv}  # CSV 파일 경로

