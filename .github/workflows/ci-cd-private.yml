name: CI/CD Pipeline - Private EC2 (K8s Deployment)

# ==================================================
# Private EC2мҡ© CI/CD Pipeline
# - л°°нҸ¬ лҢҖмғҒ: auth, buyer, seller, order, support, elasticsearch
# - л°°нҸ¬ л°©мӢқ: Kubernetes (k8s) - м• н”ҢлҰ¬мјҖмқҙм…ҳ лӘЁл“Ҳ
#            Docker Compose - Elasticsearch (лҚ°мқҙн„° мқён”„лқј)
# - Runner: private-ec2-runner (self-hosted)
# ==================================================

on:
  push:
    branches:
      - main-auth
      - main-buyer
      - main-seller
      - main-order
      - main-support
      - main-elasticsearch
  pull_request:
    branches:
      - main-auth
      - main-buyer
      - main-seller
      - main-order
      - main-support
      - main-elasticsearch
    types: [opened, synchronize, reopened]

# GITHUB_TOKENм—җ нҢЁнӮӨм§Җ м“°кё° к¶Ңн•ң л¶Җм—¬
permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: do-develop-space
  IMAGE_VERSION: 0.1.0

jobs:
  # ==================================================
  # CI: Build, Test, Code Quality
  # ==================================================
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && 
       (startsWith(github.ref, 'refs/heads/main-auth') ||
        startsWith(github.ref, 'refs/heads/main-buyer') ||
        startsWith(github.ref, 'refs/heads/main-seller') ||
        startsWith(github.ref, 'refs/heads/main-order') ||
        startsWith(github.ref, 'refs/heads/main-support'))) ||
      (github.event_name == 'pull_request' && 
       (startsWith(github.base_ref, 'main-auth') ||
        startsWith(github.base_ref, 'main-buyer') ||
        startsWith(github.base_ref, 'main-seller') ||
        startsWith(github.base_ref, 'main-order') ||
        startsWith(github.base_ref, 'main-support')))
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Extract module name from branch
        id: module
        run: |
          if [[ "$GITHUB_REF" == refs/heads/main-* ]]; then
            MODULE=$(echo ${GITHUB_REF#refs/heads/main-} | tr '[:upper:]' '[:lower:]')
          else
            MODULE=""
          fi
          
          # л№Ңл“ңн•  лӘЁл“Ҳ кІ°м • (Private EC2мҡ©: auth, buyer, seller, order, supportл§Ң)
          # elasticsearchлҠ” л№Ңл“ң л¶Ҳн•„мҡ” (docker-composeлЎң л°°нҸ¬)
          case "$MODULE" in
            auth) BUILD_MODULE=":baro-auth" ;;
            buyer) BUILD_MODULE=":baro-buyer" ;;
            seller) BUILD_MODULE=":baro-seller" ;;
            order) BUILD_MODULE=":baro-order" ;;
            support) BUILD_MODULE=":baro-support" ;;
            elasticsearch) BUILD_MODULE="" ;;  # elasticsearchлҠ” л№Ңл“ң л¶Ҳн•„мҡ”
            *) BUILD_MODULE="" ;;
          esac
          
          echo "module=$MODULE" >> $GITHUB_OUTPUT
          echo "build_module=$BUILD_MODULE" >> $GITHUB_OUTPUT
          echo "Extracted module: $MODULE -> Build: $BUILD_MODULE"
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'
      
      - name: Cache Gradle build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Code formatting check (Spotless)
        continue-on-error: true
        run: |
          BUILD_MODULE="${{ steps.module.outputs.build_module }}"
          if [ -n "$BUILD_MODULE" ]; then
            ./gradlew ${BUILD_MODULE}:spotlessCheck
          else
            ./gradlew spotlessCheck
          fi
      
      - name: Lint check (Checkstyle)
        continue-on-error: true
        run: |
          BUILD_MODULE="${{ steps.module.outputs.build_module }}"
          if [ -n "$BUILD_MODULE" ]; then
            ./gradlew ${BUILD_MODULE}:checkstyleMain
          else
            ./gradlew checkstyleMain
          fi
      
      - name: Build with Gradle
        run: |
          BUILD_MODULE="${{ steps.module.outputs.build_module }}"
          if [ -n "$BUILD_MODULE" ]; then
            ./gradlew ${BUILD_MODULE}:build -x test
          else
            ./gradlew build -x test
          fi
      
      - name: Run tests
        continue-on-error: true
        run: |
          BUILD_MODULE="${{ steps.module.outputs.build_module }}"
          if [ -n "$BUILD_MODULE" ]; then
            ./gradlew ${BUILD_MODULE}:test
          else
            ./gradlew test
          fi
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/build/test-results/test/'
          if-no-files-found: ignore
      
      - name: Determine artifact paths
        id: artifacts
        run: |
          MODULE="${{ steps.module.outputs.module }}"
          BUILD_MODULE="${{ steps.module.outputs.build_module }}"
          
          case "$MODULE" in
            auth) ARTIFACT_PATHS="baro-auth/build/libs/*.jar" ;;
            buyer) ARTIFACT_PATHS="baro-buyer/build/libs/*.jar" ;;
            seller) ARTIFACT_PATHS="baro-seller/build/libs/*.jar" ;;
            order) ARTIFACT_PATHS="baro-order/build/libs/*.jar" ;;
            support) ARTIFACT_PATHS="baro-support/build/libs/*.jar" ;;
            elasticsearch) ARTIFACT_PATHS="" ;;  # elasticsearchлҠ” л№Ңл“ң л¶Ҳн•„мҡ”
            *) ARTIFACT_PATHS="" ;;
          esac
          
          echo "paths<<EOF" >> $GITHUB_OUTPUT
          echo "$ARTIFACT_PATHS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: Upload build artifacts
        if: steps.artifacts.outputs.paths != ''
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            ${{ steps.artifacts.outputs.paths }}
          if-no-files-found: ignore

  # ==================================================
  # Docker: Build and Push Images
  # ==================================================
  determine-service:
    name: Determine Service to Build
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && 
       (startsWith(github.ref, 'refs/heads/main-auth') ||
        startsWith(github.ref, 'refs/heads/main-buyer') ||
        startsWith(github.ref, 'refs/heads/main-seller') ||
        startsWith(github.ref, 'refs/heads/main-order') ||
        startsWith(github.ref, 'refs/heads/main-support'))) ||
      (github.event_name == 'pull_request' && 
       (startsWith(github.base_ref, 'main-auth') ||
        startsWith(github.base_ref, 'main-buyer') ||
        startsWith(github.base_ref, 'main-seller') ||
        startsWith(github.base_ref, 'main-order') ||
        startsWith(github.base_ref, 'main-support')))
    outputs:
      service: ${{ steps.module.outputs.service }}
      module: ${{ steps.module.outputs.module }}
      image_tag: ${{ steps.module.outputs.image_tag }}
    steps:
      - name: Extract service name from branch
        id: module
        run: |
          if [[ "$GITHUB_REF" == refs/heads/main-* ]]; then
            MODULE=$(echo ${GITHUB_REF#refs/heads/main-} | tr '[:upper:]' '[:lower:]')
          else
            MODULE=""
          fi
          
          # лӘЁл“ҲлӘ…мқ„ м„ңл№„мҠӨлӘ…мңјлЎң ліҖнҷҳ (Private EC2мҡ©л§Ң)
          # elasticsearchлҠ” docker-composeлЎң л°°нҸ¬н•ҳлҜҖлЎң л№Ңл“ң л¶Ҳн•„мҡ”
          case "$MODULE" in
            auth) SERVICE="baro-auth" ;;
            buyer) SERVICE="baro-buyer" ;;
            seller) SERVICE="baro-seller" ;;
            order) SERVICE="baro-order" ;;
            support) SERVICE="baro-support" ;;
            elasticsearch) SERVICE="" ;;  # elasticsearchлҠ” л№Ңл“ң л¶Ҳн•„мҡ”
            *) SERVICE="" ;;
          esac
          
          # мқҙлҜём§Җ нғңк·ё кІ°м •
          if [[ "$GITHUB_REF" == refs/heads/main-* ]]; then
            IMAGE_TAG="latest"
          else
            IMAGE_TAG="latest"
          fi
          
          echo "module=$MODULE" >> $GITHUB_OUTPUT
          echo "service=$SERVICE" >> $GITHUB_OUTPUT
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "Extracted module: $MODULE -> service: $SERVICE with tag: $IMAGE_TAG"

  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [build-and-test, determine-service]
    timeout-minutes: 30
    if: |
      github.event_name == 'push' && 
      startsWith(github.ref, 'refs/heads/main-') &&
      needs.determine-service.outputs.service != '' &&
      needs.determine-service.outputs.module != 'elasticsearch'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'
      
      - name: Cache Gradle build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Download build artifacts
        continue-on-error: true  # м•„нӢ°нҢ©нҠёк°Җ м—Ҷм–ҙлҸ„ кі„мҶҚ м§„н–ү
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: .
      
      - name: Build module if artifact not found
        run: |
          SERVICE="${{ needs.determine-service.outputs.service }}"
          case "$SERVICE" in
            baro-auth) MODULE_PATH="baro-auth" ;;
            baro-buyer) MODULE_PATH="baro-buyer" ;;
            baro-seller) MODULE_PATH="baro-seller" ;;
            baro-order) MODULE_PATH="baro-order" ;;
            baro-support) MODULE_PATH="baro-support" ;;
            *) MODULE_PATH="" ;;
          esac
          
          if [ -n "$MODULE_PATH" ]; then
            JAR_COUNT=$(find "$MODULE_PATH/build/libs" -name "*.jar" 2>/dev/null | wc -l)
            if [ "$JAR_COUNT" -eq 0 ]; then
              echo "JAR file not found, building module: $MODULE_PATH"
              GRADLE_MODULE=$(echo "$MODULE_PATH" | tr '/' ':')
              ./gradlew :${GRADLE_MODULE}:build -x test
            else
              echo "JAR file found in $MODULE_PATH/build/libs"
            fi
          fi
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host
          buildkitd-flags: --allow-insecure-entitlement security.insecure --allow-insecure-entitlement network.host
          version: latest
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: do-develop-space
          password: ${{ secrets.GHCR_PAT }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ needs.determine-service.outputs.service }}
          tags: |
            type=raw,value=latest
            type=ref,event=branch
            type=sha,prefix={{branch}}-,format=short
            type=raw,value={{branch}}-{{date 'YYYYMMDD-HHmmss'}}
          flavor: |
            latest=true
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/${{ needs.determine-service.outputs.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ needs.determine-service.outputs.service }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ needs.determine-service.outputs.service }}:buildcache,mode=max
      
      - name: Make package public
        if: success()
        run: |
          PACKAGE_NAME="${{ needs.determine-service.outputs.service }}"
          echo "Making package ${PACKAGE_NAME} public..."
          
          curl -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/user/packages/container/${PACKAGE_NAME} \
            -d '{"visibility":"public"}' || echo "Failed to make package public (may already be public or require manual setup)"
          
          echo "вң… Package ${PACKAGE_NAME} visibility set to public"

  # ==================================================
  # CD: Deploy to Private EC2 (K8s)
  # ==================================================
  deploy:
    name: Deploy to Private EC2 (K8s)
    # Private EC2мқҳ self-hosted runnerм—җм„ң мӢӨн–ү
    # Runner лқјлІЁмқ„ мӮ¬мҡ©н•ҳм—¬ Private EC2л§Ң м„ нғқ
    # м—¬лҹ¬ runnerк°Җ мһҲмқ„ л•Ң лқјлІЁлЎң лӘ…нҷ•нһҲ кө¬л¶„
    runs-on: [self-hosted, private]
    needs: [build-and-test, determine-service, docker-build]
    timeout-minutes: 30  # л°°нҸ¬ нғҖмһ„м•„мӣғ м„Өм •
    if: |
      startsWith(github.ref, 'refs/heads/main-') &&
      needs.determine-service.outputs.module != '' &&
      always() && 
      (needs.determine-service.outputs.module == 'elasticsearch' ||
       (needs.docker-build.result == 'success' || needs.docker-build.result == 'skipped'))
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Extract module name
        id: module
        run: |
          MODULE="${{ needs.determine-service.outputs.module }}"
          echo "name=$MODULE" >> $GITHUB_OUTPUT
          echo "branch=${GITHUB_REF#refs/heads/}" >> $GITHUB_OUTPUT
          echo "рҹҡҖ [Private EC2] Deploying module: $MODULE from branch: ${GITHUB_REF#refs/heads/}"

      - name: Prepare deployment directory
        run: |
          mkdir -p /home/ubuntu/apps/BE
          cd /home/ubuntu/apps/BE

      - name: Copy deployment files
        run: |
          MODULE="${{ steps.module.outputs.name }}"
          mkdir -p /home/ubuntu/apps/BE
          cd /home/ubuntu/apps/BE

          # k8s л””л үнҶ лҰ¬ ліөмӮ¬
          if [ -d "$GITHUB_WORKSPACE/k8s" ]; then
            echo "рҹ“Ұ [Private EC2] k8s л””л үнҶ лҰ¬ ліөмӮ¬ мӨ‘..."
            echo "   - мҶҢмҠӨ: $GITHUB_WORKSPACE/k8s"
            echo "   - лҢҖмғҒ: /home/ubuntu/apps/k8s"
            mkdir -p /home/ubuntu/apps
            
            # м„ңлІ„м—җ м§Ғм ‘ л§Ңл“  scripts нҸҙлҚ” л“ұ л°ұм—…
            if [ -d "/home/ubuntu/apps/k8s/scripts" ]; then
              echo "рҹ’ҫ кё°мЎҙ scripts нҸҙлҚ” л°ұм—… мӨ‘..."
              cp -r /home/ubuntu/apps/k8s/scripts /tmp/k8s-scripts-backup-$$ 2>/dev/null || true
            fi
            
            # rsyncлЎң нҢҢмқјл§Ң м—…лҚ°мқҙнҠё (--delete мҳөм…ҳ м—Ҷмқҙ, кё°мЎҙ м¶”к°Җ нҢҢмқј ліҙмЎҙ)
            if command -v rsync &> /dev/null; then
              rsync -av "$GITHUB_WORKSPACE/k8s/" /home/ubuntu/apps/k8s/ || {
                echo "вҡ пёҸ  rsync мӢӨнҢЁ, cp мӮ¬мҡ©мңјлЎң лҢҖмІҙ..."
                mkdir -p /home/ubuntu/apps/k8s
                cp -r "$GITHUB_WORKSPACE/k8s"/* /home/ubuntu/apps/k8s/ 2>/dev/null || {
                  echo "вқҢ k8s л””л үнҶ лҰ¬ ліөмӮ¬ мӢӨнҢЁ"
                  echo "л””лІ„к·ё м •ліҙ:"
                  echo "  - мҶҢмҠӨ л””л үнҶ лҰ¬ мЎҙмһ¬: $([ -d "$GITHUB_WORKSPACE/k8s" ] && echo 'yes' || echo 'no')"
                  echo "  - мҶҢмҠӨ л””л үнҶ лҰ¬ лӮҙмҡ©:"
                  ls -la "$GITHUB_WORKSPACE/k8s" 2>&1 | head -10 || true
                  exit 1
                }
              }
            else
              # rsyncк°Җ м—Ҷмңјл©ҙ cp мӮ¬мҡ©н•ҳлҗҳ, кё°мЎҙ л””л үнҶ лҰ¬лҠ” мӮӯм ңн•ҳм§Җ м•ҠмқҢ
              echo "вҡ пёҸ  rsyncк°Җ м—ҶмҠөлӢҲлӢӨ. cp мӮ¬мҡ©..."
              mkdir -p /home/ubuntu/apps/k8s
              cp -r "$GITHUB_WORKSPACE/k8s"/* /home/ubuntu/apps/k8s/ 2>/dev/null || {
                echo "вқҢ k8s л””л үнҶ лҰ¬ ліөмӮ¬ мӢӨнҢЁ"
                exit 1
              }
            fi
            
            # л°ұм—…н•ң scripts нҸҙлҚ” ліөмӣҗ
            if [ -d "/tmp/k8s-scripts-backup-$$" ]; then
              echo "рҹ”„ кё°мЎҙ scripts нҸҙлҚ” ліөмӣҗ мӨ‘..."
              mkdir -p /home/ubuntu/apps/k8s/scripts
              cp -r /tmp/k8s-scripts-backup-$$/* /home/ubuntu/apps/k8s/scripts/ 2>/dev/null || true
              rm -rf /tmp/k8s-scripts-backup-$$
            fi
            
            echo "вң… k8s л””л үнҶ лҰ¬ ліөмӮ¬ мҷ„лЈҢ: /home/ubuntu/apps/k8s (кё°мЎҙ м¶”к°Җ нҢҢмқј ліҙмЎҙ)"
          else
            echo "вҡ пёҸ  [Private EC2] k8s л””л үнҶ лҰ¬лҘј м°ҫмқ„ мҲҳ м—ҶмҠөлӢҲлӢӨ: $GITHUB_WORKSPACE/k8s"
            echo "л””лІ„к·ё м •ліҙ:"
            echo "  - GITHUB_WORKSPACE: $GITHUB_WORKSPACE"
            echo "  - нҳ„мһ¬ л””л үнҶ лҰ¬: $(pwd)"
            echo "  - л””л үнҶ лҰ¬ лӮҙмҡ©:"
            ls -la "$GITHUB_WORKSPACE" 2>&1 | head -20 || true
          fi

          # л°°нҸ¬ мҠӨнҒ¬лҰҪнҠё ліөмӮ¬ (k8s л°°нҸ¬мҡ©)
          if [ -f "$GITHUB_WORKSPACE/scripts/deploy-k8s.sh" ]; then
            # /home/ubuntu/apps/BE/scripts/м—җ ліөмӮ¬
            mkdir -p /home/ubuntu/apps/BE/scripts
            cp $GITHUB_WORKSPACE/scripts/deploy-k8s.sh ./scripts/ 2>/dev/null || {
              echo "вҡ пёҸ  BE/scripts ліөмӮ¬ мӢӨнҢЁ, мһ¬мӢңлҸ„..."
              mkdir -p ./scripts
              cp $GITHUB_WORKSPACE/scripts/deploy-k8s.sh ./scripts/ || {
                echo "вқҢ deploy-k8s.sh ліөмӮ¬ мӢӨнҢЁ"
                exit 1
              }
            }
            chmod +x ./scripts/deploy-k8s.sh
            
            # /home/ubuntu/apps/k8s/scripts/м—җлҸ„ ліөмӮ¬
            mkdir -p /home/ubuntu/apps/k8s/scripts
            cp $GITHUB_WORKSPACE/scripts/deploy-k8s.sh /home/ubuntu/apps/k8s/scripts/ || {
              echo "вҡ пёҸ  k8s/scripts ліөмӮ¬ мӢӨнҢЁ"
            }
            chmod +x /home/ubuntu/apps/k8s/scripts/deploy-k8s.sh
            
            echo "вң… deploy-k8s.sh мҠӨнҒ¬лҰҪнҠё ліөмӮ¬ мҷ„лЈҢ (BE/scripts л°Ҹ k8s/scripts)"
          else
            echo "вҡ пёҸ  [Private EC2] deploy-k8s.sh мҠӨнҒ¬лҰҪнҠёлҘј м°ҫмқ„ мҲҳ м—ҶмҠөлӢҲлӢӨ: $GITHUB_WORKSPACE/scripts/deploy-k8s.sh"
            echo "л””лІ„к·ё м •ліҙ:"
            echo "  - scripts л””л үнҶ лҰ¬ мЎҙмһ¬: $([ -d "$GITHUB_WORKSPACE/scripts" ] && echo 'yes' || echo 'no')"
            if [ -d "$GITHUB_WORKSPACE/scripts" ]; then
              echo "  - scripts л””л үнҶ лҰ¬ лӮҙмҡ©:"
              ls -la "$GITHUB_WORKSPACE/scripts" 2>&1 || true
            fi
          fi

          # elasticsearch лӘЁл“Ҳмқё кІҪмҡ° docker-compose нҢҢмқј ліөмӮ¬
          if [ "$MODULE" = "elasticsearch" ]; then
            echo "рҹ“Ұ [Private EC2] elasticsearch лӘЁл“Ҳмҡ© docker-compose нҢҢмқј ліөмӮ¬ мӨ‘..."
            if [ -f "$GITHUB_WORKSPACE/docker-compose.elasticsearch.yml" ]; then
              cp "$GITHUB_WORKSPACE/docker-compose.elasticsearch.yml" . || {
                echo "вқҢ docker-compose.elasticsearch.yml ліөмӮ¬ мӢӨнҢЁ"
                exit 1
              }
              echo "вң… docker-compose.elasticsearch.yml ліөмӮ¬ мҷ„лЈҢ"
            else
              echo "вқҢ docker-compose.elasticsearch.yml нҢҢмқјмқ„ м°ҫмқ„ мҲҳ м—ҶмҠөлӢҲлӢӨ: $GITHUB_WORKSPACE/docker-compose.elasticsearch.yml"
              exit 1
            fi

            # Elasticsearch л№Ңл“ң м»Ён…ҚмҠӨнҠё ліөмӮ¬
            if [ -d "$GITHUB_WORKSPACE/docker/baro-es" ]; then
              echo "рҹ“Ұ [Private EC2] Elasticsearch л№Ңл“ң м»Ён…ҚмҠӨнҠё ліөмӮ¬ мӨ‘..."
              mkdir -p ./docker/baro-es
              cp -r "$GITHUB_WORKSPACE/docker/baro-es"/* ./docker/baro-es/ 2>/dev/null || {
                echo "вҡ пёҸ  Elasticsearch л№Ңл“ң м»Ён…ҚмҠӨнҠё ліөмӮ¬ мӢӨнҢЁ (кі„мҶҚ м§„н–ү)"
              }
              echo "вң… Elasticsearch л№Ңл“ң м»Ён…ҚмҠӨнҠё ліөмӮ¬ мҷ„лЈҢ"
            else
              echo "в„№пёҸ  [Private EC2] Elasticsearch л№Ңл“ң м»Ён…ҚмҠӨнҠёк°Җ м—ҶмҠөлӢҲлӢӨ (кіөмӢқ мқҙлҜём§Җ мӮ¬мҡ©): $GITHUB_WORKSPACE/docker/baro-es"
            fi

            # deploy-module.sh мҠӨнҒ¬лҰҪнҠё ліөмӮ¬
            if [ -f "$GITHUB_WORKSPACE/scripts/deploy-module.sh" ]; then
              mkdir -p /home/ubuntu/apps/BE/scripts
              cp "$GITHUB_WORKSPACE/scripts/deploy-module.sh" ./scripts/ 2>/dev/null || {
                echo "вҡ пёҸ  BE/scripts deploy-module.sh ліөмӮ¬ мӢӨнҢЁ, мһ¬мӢңлҸ„..."
                mkdir -p ./scripts
                cp "$GITHUB_WORKSPACE/scripts/deploy-module.sh" ./scripts/ || {
                  echo "вқҢ deploy-module.sh ліөмӮ¬ мӢӨнҢЁ"
                  exit 1
                }
              }
              chmod +x ./scripts/deploy-module.sh
              echo "вң… deploy-module.sh мҠӨнҒ¬лҰҪнҠё ліөмӮ¬ мҷ„лЈҢ (BE/scripts)"
            else
              echo "вҡ пёҸ  [Private EC2] deploy-module.sh мҠӨнҒ¬лҰҪнҠёлҘј м°ҫмқ„ мҲҳ м—ҶмҠөлӢҲлӢӨ: $GITHUB_WORKSPACE/scripts/deploy-module.sh"
              echo "л””лІ„к·ё м •ліҙ:"
              echo "  - scripts л””л үнҶ лҰ¬ мЎҙмһ¬: $([ -d "$GITHUB_WORKSPACE/scripts" ] && echo 'yes' || echo 'no')"
              if [ -d "$GITHUB_WORKSPACE/scripts" ]; then
                echo "  - scripts л””л үнҶ лҰ¬ лӮҙмҡ©:"
                ls -la "$GITHUB_WORKSPACE/scripts" 2>&1 | head -10 || true
              fi
            fi
          fi

      - name: Setup kubeconfig
        if: steps.module.outputs.name != 'elasticsearch'
        run: |
          # Private EC2лҠ” worker nodeмқҙлҜҖлЎң Public EC2мқҳ control-planeм—җ м—°кІ°
          # Worker nodeм—җлҠ” /etc/rancher/k3s/k3s.yamlмқҙ м—ҶмңјлҜҖлЎң,
          # мқҙлҜё м„Өм •лҗң ~/.kube/configлҘј мӮ¬мҡ©н•ҳкұ°лӮҳ, control-planeмқҳ kubeconfigлҘј к°Җм ёмҷҖм•ј н•Ё
          mkdir -p ~/.kube
          
          # л°©лІ• 1: мқҙлҜё ~/.kube/configк°Җ м„Өм •лҗҳм–ҙ мһҲлҠ”м§Җ нҷ•мқё
          if [ -f ~/.kube/config ]; then
            echo "вң… [Private EC2 - Worker Node] кё°мЎҙ kubeconfig нҢҢмқј л°ңкІ¬"
            CURRENT_SERVER=$(grep -E "^\s*server:" ~/.kube/config | awk '{print $2}' | sed 's|https://||' | sed 's|:6443||' | head -1)
            if [ -n "$CURRENT_SERVER" ] && [ "$CURRENT_SERVER" != "127.0.0.1" ]; then
              echo "вң… kubeconfigк°Җ мқҙлҜё Public EC2 control-planeмқ„ к°ҖлҰ¬нӮӨкі  мһҲмҠөлӢҲлӢӨ: $CURRENT_SERVER"
              
              # Public EC2 IPк°Җ нҷҳкІҪліҖмҲҳлЎң м ңкіөлҗҳл©ҙ нҷ•мқё
              PUBLIC_EC2_IP="${PUBLIC_EC2_CONTROL_PLANE_IP:-}"
              if [ -n "$PUBLIC_EC2_IP" ] && [ "$CURRENT_SERVER" != "$PUBLIC_EC2_IP" ]; then
                echo "рҹ”§ [Private EC2 - Worker Node] kubeconfigмқҳ server мЈјмҶҢлҘј Public EC2 control-plane IPлЎң ліҖкІҪ: $PUBLIC_EC2_IP"
                sed -i "s|server:.*|server: https://$PUBLIC_EC2_IP:6443|g" ~/.kube/config || true
                echo "вң… kubeconfig м„Өм • мҷ„лЈҢ (server: https://$PUBLIC_EC2_IP:6443)"
              fi
            else
              echo "вҡ пёҸ  kubeconfigмқҳ server мЈјмҶҢк°Җ localhostмһ…лӢҲлӢӨ. Public EC2 IPлЎң ліҖкІҪ н•„мҡ”"
              PUBLIC_EC2_IP="${PUBLIC_EC2_CONTROL_PLANE_IP:-}"
              if [ -z "$PUBLIC_EC2_IP" ]; then
                echo "вқҢ PUBLIC_EC2_CONTROL_PLANE_IP нҷҳкІҪліҖмҲҳк°Җ м„Өм •лҗҳм§Җ м•Ҡм•ҳмҠөлӢҲлӢӨ."
                echo "   GitHub Secretsм—җ PUBLIC_EC2_CONTROL_PLANE_IPлҘј м¶”к°Җн•ҳкұ°лӮҳ,"
                echo "   kubeconfigлҘј мҲҳлҸҷмңјлЎң м„Өм •н•ҙмЈјм„ёмҡ”."
                exit 1
              else
                echo "рҹ”§ [Private EC2 - Worker Node] kubeconfigмқҳ server мЈјмҶҢлҘј Public EC2 control-plane IPлЎң ліҖкІҪ: $PUBLIC_EC2_IP"
                sed -i "s|server:.*|server: https://$PUBLIC_EC2_IP:6443|g" ~/.kube/config || true
                echo "вң… kubeconfig м„Өм • мҷ„лЈҢ (server: https://$PUBLIC_EC2_IP:6443)"
              fi
            fi
          # л°©лІ• 2: /etc/rancher/k3s/k3s.yamlмқҙ мһҲлӢӨл©ҙ ліөмӮ¬ (мқјл¶Җ м„Өм •м—җм„ң мЎҙмһ¬н•  мҲҳ мһҲмқҢ)
          elif [ -f /etc/rancher/k3s/k3s.yaml ]; then
            echo "рҹ“Ӣ [Private EC2 - Worker Node] /etc/rancher/k3s/k3s.yaml нҢҢмқјм—җм„ң kubeconfig ліөмӮ¬ мӨ‘..."
            sudo cp /etc/rancher/k3s/k3s.yaml ~/.kube/config
            sudo chown $USER:$USER ~/.kube/config
            chmod 600 ~/.kube/config
            
            # Public EC2мқҳ control-plane IPлЎң ліҖкІҪ
            PUBLIC_EC2_IP="${PUBLIC_EC2_CONTROL_PLANE_IP:-}"
            if [ -z "$PUBLIC_EC2_IP" ]; then
              echo "вҡ пёҸ  PUBLIC_EC2_CONTROL_PLANE_IP нҷҳкІҪліҖмҲҳк°Җ м„Өм •лҗҳм§Җ м•Ҡм•ҳмҠөлӢҲлӢӨ."
              echo "   GitHub Secretsм—җ PUBLIC_EC2_CONTROL_PLANE_IPлҘј м¶”к°Җн•ҳкұ°лӮҳ,"
              echo "   kubeconfigлҘј мҲҳлҸҷмңјлЎң м„Өм •н•ҙмЈјм„ёмҡ”."
              exit 1
            else
              echo "рҹ”§ [Private EC2 - Worker Node] kubeconfigмқҳ server мЈјмҶҢлҘј Public EC2 control-plane IPлЎң ліҖкІҪ: $PUBLIC_EC2_IP"
              sed -i "s|server:.*|server: https://$PUBLIC_EC2_IP:6443|g" ~/.kube/config || true
              echo "вң… kubeconfig м„Өм • мҷ„лЈҢ (server: https://$PUBLIC_EC2_IP:6443)"
            fi
          else
            echo "вқҢ [Private EC2 - Worker Node] kubeconfig нҢҢмқјмқ„ м°ҫмқ„ мҲҳ м—ҶмҠөлӢҲлӢӨ."
            echo "л””лІ„к·ё м •ліҙ:"
            echo "  - ~/.kube/config мЎҙмһ¬ м—¬л¶Җ: $([ -f ~/.kube/config ] && echo 'yes' || echo 'no')"
            echo "  - /etc/rancher/k3s/k3s.yaml мЎҙмһ¬ м—¬л¶Җ: $([ -f /etc/rancher/k3s/k3s.yaml ] && echo 'yes' || echo 'no')"
            echo "  - k3s-agent м„Өм№ҳ нҷ•мқё:"
            sudo systemctl status k3s-agent 2>&1 | head -10 || true
            echo ""
            echo "н•ҙкІ° л°©лІ•:"
            echo "  1. Public EC2 control-planeм—җм„ң kubeconfigлҘј к°Җм ёмҷҖ ~/.kube/configм—җ м„Өм •н•ҳкұ°лӮҳ"
            echo "  2. GitHub Secretsм—җ PUBLIC_EC2_CONTROL_PLANE_IPлҘј м„Өм •н•ҳкі  kubeconfigлҘј мҲҳлҸҷмңјлЎң кө¬м„ұн•ҳм„ёмҡ”"
            exit 1
          fi

      - name: Check k3s availability
        if: steps.module.outputs.name != 'elasticsearch'
        id: k3s-check
        run: |
          # kubeconfig нҷҳкІҪ ліҖмҲҳ м„Өм •
          if [ -f ~/.kube/config ]; then
            export KUBECONFIG=~/.kube/config
          fi
          
          # kubectl лӘ…л №м–ҙ нҷ•мқё
          KUBECTL_CMD=""
          if command -v kubectl &> /dev/null; then
            # мқјл°ҳ kubectl мӮ¬мҡ© (kubeconfigк°Җ м„Өм •лҗҳм–ҙ мһҲмңјл©ҙ мһҗлҸҷмңјлЎң мӮ¬мҡ©)
            KUBECTL_CMD="kubectl"
            echo "вң… [Private EC2 - Worker Node] kubectl лӘ…л №м–ҙ л°ңкІ¬: kubectl"
          elif command -v k3s &> /dev/null; then
            # k3sк°Җ м„Өм№ҳлҗҳм–ҙ мһҲмңјл©ҙ k3s kubectl мӮ¬мҡ©
            # kubeconfigк°Җ м„Өм •лҗҳм–ҙ мһҲмңјл©ҙ мқјл°ҳ kubectlмІҳлҹј мӮ¬мҡ© к°ҖлҠҘ
            if [ -f ~/.kube/config ]; then
              # k3sлҠ” kubectlмқ„ /usr/local/bin/kubectlм—җ мӢ¬ліјлҰӯ л§ҒнҒ¬лЎң м„Өм№ҳ
              if [ -L /usr/local/bin/kubectl ] || [ -f /usr/local/bin/kubectl ]; then
                KUBECTL_CMD="/usr/local/bin/kubectl"
                echo "вң… [Private EC2] kubectl лӘ…л №м–ҙ л°ңкІ¬: /usr/local/bin/kubectl"
              else
                # м§Ғм ‘ кІҪлЎңлЎң мӮ¬мҡ© л¶Ҳк°ҖлҠҘн•ҳл©ҙ sudo k3s kubectl мӮ¬мҡ©
                KUBECTL_CMD="sudo k3s kubectl"
                echo "вң… [Private EC2] k3s kubectl лӘ…л №м–ҙ мӮ¬мҡ©: sudo k3s kubectl"
              fi
            else
              # kubeconfigк°Җ м—Ҷмңјл©ҙ sudo k3s kubectl мӮ¬мҡ©
              KUBECTL_CMD="sudo k3s kubectl"
              echo "вң… [Private EC2] k3s kubectl лӘ…л №м–ҙ мӮ¬мҡ© (kubeconfig м—ҶмқҢ): sudo k3s kubectl"
            fi
          else
            echo "k3s_available=false" >> $GITHUB_OUTPUT
            echo "вқҢ [Private EC2 - Worker Node] kubectl лҳҗлҠ” k3sк°Җ м„Өм№ҳлҗҳм–ҙ мһҲм§Җ м•ҠмҠөлӢҲлӢӨ."
            echo "л””лІ„к·ё м •ліҙ:"
            echo "  - kubectl кІҪлЎң: $(which kubectl 2>&1 || echo 'not found')"
            echo "  - k3s кІҪлЎң: $(which k3s 2>&1 || echo 'not found')"
            echo "  - /usr/local/bin/kubectl: $([ -f /usr/local/bin/kubectl ] && echo 'exists' || echo 'not found')"
            exit 1
          fi
          
          # нҒҙлҹ¬мҠӨн„° м—°кІ° нҷ•мқё (Public EC2мқҳ control-planeм—җ м—°кІ°)
          if $KUBECTL_CMD get nodes &> /dev/null 2>&1; then
            echo "k3s_available=true" >> $GITHUB_OUTPUT
            echo "kubectl_cmd=$KUBECTL_CMD" >> $GITHUB_OUTPUT
            echo "вң… [Private EC2 - Worker Node] Public EC2 control-planeм—җ м—°кІ°лҗҳм—ҲмҠөлӢҲлӢӨ. k8s л°°нҸ¬лҘј м§„н–үн•©лӢҲлӢӨ."
            echo "нҒҙлҹ¬мҠӨн„° л…ёл“ң м •ліҙ:"
            $KUBECTL_CMD get nodes 2>&1 || true
            echo ""
            echo "нҒҙлҹ¬мҠӨн„° м •ліҙ:"
            $KUBECTL_CMD cluster-info 2>&1 || true
          else
            echo "k3s_available=false" >> $GITHUB_OUTPUT
            echo "вқҢ [Private EC2 - Worker Node] kubectlмқҖ мһҲм§Җл§Ң Public EC2 control-planeм—җ м—°кІ°н•  мҲҳ м—ҶмҠөлӢҲлӢӨ."
            echo "л””лІ„к·ё м •ліҙ:"
            $KUBECTL_CMD get nodes 2>&1 || true
            if [ -f ~/.kube/config ]; then
              echo "kubeconfig мң„м№ҳ: $KUBECONFIG"
              echo "kubeconfig к¶Ңн•ң:"
              ls -la ~/.kube/ 2>&1 || true
              echo "kubeconfig лӮҙмҡ© (мқјл¶Җ):"
              head -5 ~/.kube/config 2>&1 || true
            else
              echo "вҡ пёҸ  kubeconfig нҢҢмқјмқҙ м—ҶмҠөлӢҲлӢӨ: ~/.kube/config"
            fi
            exit 1
          fi

      - name: Deploy elasticsearch with docker-compose
        if: steps.module.outputs.name == 'elasticsearch'
        env:
          GITHUB_TOKEN: ${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}
        run: |
          cd /home/ubuntu/apps/BE
          echo ""
          echo "рҹҡҖ [Private EC2] Elasticsearch docker-compose л°°нҸ¬ мӢңмһ‘"
          echo "   - мһ‘м—… л””л үнҶ лҰ¬: /home/ubuntu/apps/BE"
          echo ""

          # deploy-module.sh мҠӨнҒ¬лҰҪнҠёлЎң elasticsearch л°°нҸ¬
          if [ -f "./scripts/deploy-module.sh" ]; then
            echo "рҹ“қ scripts/deploy-module.sh elasticsearch мӢӨн–ү мӨ‘..."
            echo "   - мҠӨнҒ¬лҰҪнҠё кІҪлЎң: $(pwd)/scripts/deploy-module.sh"
            echo "   - мҠӨнҒ¬лҰҪнҠё к¶Ңн•ң: $(ls -la ./scripts/deploy-module.sh 2>&1 || echo 'not found')"
            GITHUB_TOKEN=${GITHUB_TOKEN} bash ./scripts/deploy-module.sh elasticsearch || {
              echo "вқҢ deploy-module.sh elasticsearch мӢӨн–ү мӢӨнҢЁ"
              echo "л””лІ„к·ё м •ліҙ:"
              echo "  - нҳ„мһ¬ л””л үнҶ лҰ¬: $(pwd)"
              echo "  - мҠӨнҒ¬лҰҪнҠё мЎҙмһ¬: $([ -f ./scripts/deploy-module.sh ] && echo 'yes' || echo 'no')"
              echo "  - л„ӨнҠёмӣҢнҒ¬ мғҒнғң:"
              docker network ls | grep -E "be_baro-network|NETWORK" || true
              exit 1
            }
          else
            echo "вқҢ ./scripts/deploy-module.sh мҠӨнҒ¬лҰҪнҠёлҘј м°ҫмқ„ мҲҳ м—ҶмҠөлӢҲлӢӨ."
            echo "л””л үнҶ лҰ¬ лӮҙмҡ©:"
            ls -la ./scripts 2>&1 || echo "scripts л””л үнҶ лҰ¬к°Җ м—ҶмҠөлӢҲлӢӨ."
            echo "м „мІҙ л””л үнҶ лҰ¬ лӮҙмҡ©:"
            ls -la . 2>&1 | head -30 || true
            exit 1
          fi

          echo ""
          echo "вң… [Private EC2] Elasticsearch л°°нҸ¬ мҷ„лЈҢ"
          echo ""
          echo "рҹ“Ҡ м»Ён…Ңмқҙл„Ҳ мғҒнғң:"
          docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" | grep -E "baro-elasticsearch|NAMES" || docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

      - name: Deploy to k8s
        if: steps.k3s-check.outputs.k3s_available == 'true' && steps.module.outputs.name != 'elasticsearch'
        env:
          GITHUB_TOKEN: ${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}
          IMAGE_TAG: ${{ needs.determine-service.outputs.image_tag }}
          MODULE_NAME: ${{ steps.module.outputs.name }}
          KUBECONFIG: ~/.kube/config
          DATA_EC2_IP: ${{ secrets.DATA_EC2_IP || '' }}  # Data EC2 Private IP (н•„мҲҳ, м—Ҷмңјл©ҙ л°°нҸ¬ мӢӨнҢЁ)
        run: |
          export KUBECONFIG=~/.kube/config
          
          if [ -d "$GITHUB_WORKSPACE/k8s" ]; then
            echo "рҹ“Ұ [Private EC2] k8s л””л үнҶ лҰ¬ мөңмӢ  лІ„м „мңјлЎң м—…лҚ°мқҙнҠё мӨ‘..."
            mkdir -p /home/ubuntu/apps
            
            if [ -d "/home/ubuntu/apps/k8s/scripts" ]; then
              cp -r /home/ubuntu/apps/k8s/scripts /tmp/k8s-scripts-backup-$$ 2>/dev/null || true
            fi
            
            if command -v rsync &> /dev/null; then
              rsync -av "$GITHUB_WORKSPACE/k8s/" /home/ubuntu/apps/k8s/ || {
                mkdir -p /home/ubuntu/apps/k8s
                cp -r "$GITHUB_WORKSPACE/k8s"/* /home/ubuntu/apps/k8s/ 2>/dev/null || true
              }
            else
              mkdir -p /home/ubuntu/apps/k8s
              cp -r "$GITHUB_WORKSPACE/k8s"/* /home/ubuntu/apps/k8s/ 2>/dev/null || true
            fi
            
            if [ -d "/tmp/k8s-scripts-backup-$$" ]; then
              mkdir -p /home/ubuntu/apps/k8s/scripts
              cp -r /tmp/k8s-scripts-backup-$$/* /home/ubuntu/apps/k8s/scripts/ 2>/dev/null || true
              rm -rf /tmp/k8s-scripts-backup-$$
            fi
          fi
          
          if [ -f "$GITHUB_WORKSPACE/scripts/deploy-k8s.sh" ]; then
            mkdir -p /home/ubuntu/apps/BE/scripts
            cp $GITHUB_WORKSPACE/scripts/deploy-k8s.sh /home/ubuntu/apps/BE/scripts/
            chmod +x /home/ubuntu/apps/BE/scripts/deploy-k8s.sh
            
            mkdir -p /home/ubuntu/apps/k8s/scripts
            cp $GITHUB_WORKSPACE/scripts/deploy-k8s.sh /home/ubuntu/apps/k8s/scripts/
            chmod +x /home/ubuntu/apps/k8s/scripts/deploy-k8s.sh
          fi
          
          echo ""
          echo "рҹҡҖ [Private EC2 - Worker Node] k8s л°°нҸ¬ мӢңмһ‘: ${MODULE_NAME} (мқҙлҜём§Җ нғңк·ё: ${IMAGE_TAG})"
          echo "   - мһ‘м—… л””л үнҶ лҰ¬: /home/ubuntu/apps/BE"
          echo "   - k8s л””л үнҶ лҰ¬: /home/ubuntu/apps/k8s"
          echo "   - м—ӯн• : Worker Node (Public EC2 control-planeм—җ м—°кІ°)"
          echo ""
          cd /home/ubuntu/apps/BE
          
          # л°°нҸ¬ мҠӨнҒ¬лҰҪнҠё мӢӨн–ү
          if [ -f "./scripts/deploy-k8s.sh" ]; then
            bash ./scripts/deploy-k8s.sh ${MODULE_NAME} ${IMAGE_TAG} || {
              echo "вқҢ [Private EC2] л°°нҸ¬ мҠӨнҒ¬лҰҪнҠё мӢӨн–ү мӢӨнҢЁ"
              echo "л””лІ„к·ё м •ліҙ:"
              echo "  - мҠӨнҒ¬лҰҪнҠё кІҪлЎң: ./scripts/deploy-k8s.sh"
              echo "  - лӘЁл“ҲлӘ…: ${MODULE_NAME}"
              echo "  - мқҙлҜём§Җ нғңк·ё: ${IMAGE_TAG}"
              echo "  - нҳ„мһ¬ л””л үнҶ лҰ¬: $(pwd)"
              echo "  - мҠӨнҒ¬лҰҪнҠё мЎҙмһ¬ м—¬л¶Җ: $([ -f ./scripts/deploy-k8s.sh ] && echo 'yes' || echo 'no')"
              echo "  - мҠӨнҒ¬лҰҪнҠё мӢӨн–ү к¶Ңн•ң: $([ -x ./scripts/deploy-k8s.sh ] && echo 'yes' || echo 'no')"
              
              # Pod мғҒнғң нҷ•мқё
              if [ -n "$KUBECONFIG" ] && [ -f "$KUBECONFIG" ]; then
                export KUBECONFIG=~/.kube/config
                KUBECTL_CMD="${{ steps.k3s-check.outputs.kubectl_cmd }}"
                if [ -n "$KUBECTL_CMD" ]; then
                  echo ""
                  echo "рҹ“Ҡ нҳ„мһ¬ Pod мғҒнғң:"
                  $KUBECTL_CMD get pods -n baro-prod -l app=baro-${MODULE_NAME} 2>&1 || true
                  
                  # мөңмӢ  Pod лЎңк·ё м¶ңл Ҙ
                  LATEST_POD=$($KUBECTL_CMD get pods -n baro-prod -l app=baro-${MODULE_NAME} --sort-by=.metadata.creationTimestamp -o jsonpath='{.items[-1].metadata.name}' 2>/dev/null || echo "")
                  if [ -n "$LATEST_POD" ]; then
                    echo ""
                    echo "рҹ“Ӣ мөңмӢ  Pod лЎңк·ё ($LATEST_POD):"
                    $KUBECTL_CMD logs -n baro-prod "$LATEST_POD" --tail=50 2>&1 || true
                    
                    echo ""
                    echo "рҹ“Ҡ Pod мқҙлІӨнҠё:"
                    $KUBECTL_CMD describe pod -n baro-prod "$LATEST_POD" | grep -A 20 "Events:" || true
                  fi
                fi
              fi
              
              exit 1
            }
          else
            echo "вқҢ [Private EC2] л°°нҸ¬ мҠӨнҒ¬лҰҪнҠёлҘј м°ҫмқ„ мҲҳ м—ҶмҠөлӢҲлӢӨ: ./scripts/deploy-k8s.sh"
            echo "л””лІ„к·ё м •ліҙ:"
            echo "  - нҳ„мһ¬ л””л үнҶ лҰ¬: $(pwd)"
            echo "  - л””л үнҶ лҰ¬ лӮҙмҡ©:"
            ls -la ./scripts/ 2>&1 || echo "scripts л””л үнҶ лҰ¬к°Җ м—ҶмҠөлӢҲлӢӨ"
            exit 1
          fi
          
          echo ""
          echo "вң… [Private EC2] л°°нҸ¬ мҷ„лЈҢ: ${MODULE_NAME}"
          
          # л°°нҸ¬ нӣ„ кІҖмҰқ
          echo ""
          echo "рҹ”Қ [Private EC2] л°°нҸ¬ кІҖмҰқ мӨ‘..."
          sleep 5  # Pod мӢңмһ‘ лҢҖкё°
          
          export KUBECONFIG=~/.kube/config
          KUBECTL_CMD="${{ steps.k3s-check.outputs.kubectl_cmd }}"
          
          if [ -n "$KUBECTL_CMD" ]; then
            # Pod мғҒнғң нҷ•мқё
            echo "рҹ“Ҡ Pod мғҒнғң:"
            $KUBECTL_CMD get pods -n baro-prod -l app=baro-${MODULE_NAME} 2>&1 || true
            
            # Podк°Җ Ready мғҒнғңмқём§Җ нҷ•мқё
            if $KUBECTL_CMD wait --for=condition=ready pod -l app=baro-${MODULE_NAME} -n baro-prod --timeout=120s 2>/dev/null; then
              echo "вң… Podк°Җ Ready мғҒнғңмһ…лӢҲлӢӨ."
            else
              echo "вҡ пёҸ  Podк°Җ Ready мғҒнғңк°Җ лҗҳм§Җ м•Ҡм•ҳмҠөлӢҲлӢӨ."
              echo "рҹ“Ӣ Pod мғҒм„ё м •ліҙ:"
              $KUBECTL_CMD get pods -n baro-prod -l app=baro-${MODULE_NAME} -o wide 2>&1 || true
              
              # мөңмӢ  Pod лЎңк·ё м¶ңл Ҙ
              LATEST_POD=$($KUBECTL_CMD get pods -n baro-prod -l app=baro-${MODULE_NAME} --sort-by=.metadata.creationTimestamp -o jsonpath='{.items[-1].metadata.name}' 2>/dev/null || echo "")
              if [ -n "$LATEST_POD" ]; then
                echo ""
                echo "рҹ“Ӣ мөңмӢ  Pod лЎңк·ё ($LATEST_POD):"
                $KUBECTL_CMD logs -n baro-prod "$LATEST_POD" --tail=50 2>&1 || true
                
                echo ""
                echo "рҹ“Ҡ Pod мқҙлІӨнҠё:"
                $KUBECTL_CMD describe pod -n baro-prod "$LATEST_POD" | grep -A 20 "Events:" || true
              fi
            fi
            
            # Service нҷ•мқё
            echo ""
            echo "рҹ“Ҡ Service мғҒнғң:"
            $KUBECTL_CMD get svc -n baro-prod -l app=baro-${MODULE_NAME} 2>&1 || true
          fi

  # ==================================================
  # Cleanup: мҳӨлһҳлҗң мқҙлҜём§Җ м •лҰ¬
  # ==================================================
  cleanup:
    name: Cleanup Old Images
    runs-on: ubuntu-latest
    needs: [deploy, determine-service]
    if: |
      success() &&
      needs.determine-service.outputs.service != ''
    permissions:
      contents: read
      packages: write

    steps:
      - name: Cleanup container images by tag policy
        env:
          SERVICE: ${{ needs.determine-service.outputs.service }}
          OWNER: ${{ github.repository_owner }}
          GH_TOKEN: ${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}
          IMAGE_VERSION: ${{ env.IMAGE_VERSION }}
        run: |
          if [ -z "$SERVICE" ]; then
            echo "No service to clean up. Skipping."
            exit 0
          fi

          if [ -z "$GH_TOKEN" ]; then
            echo "вқҢ GH_TOKEN is not set."
            exit 1
          fi

          echo "рҹ§№ Cleaning up GHCR images for service: $SERVICE (owner: $OWNER)"
          echo "  - Keep tags: latest, $IMAGE_VERSION"

          sudo apt-get update -y >/dev/null 2>&1 || true
          sudo apt-get install -y jq >/dev/null 2>&1 || true

          API_ROOT="https://api.github.com"

          VERSIONS_JSON=$(curl -sS \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "${API_ROOT}/users/${OWNER}/packages/container/${SERVICE}/versions?per_page=100")

          if echo "$VERSIONS_JSON" | jq -e 'type=="array"' >/dev/null 2>&1; then
            :
          else
            echo "No versions found or failed to fetch versions."
            exit 0
          fi

          KEEP_TAG_1="latest"
          KEEP_TAG_2="$IMAGE_VERSION"

          echo "$VERSIONS_JSON" | jq -c '.[]' | while read -r row; do
            ID=$(echo "$row" | jq -r '.id')
            CREATED_AT=$(echo "$row" | jq -r '.created_at')
            TAGS=$(echo "$row" | jq -r '.metadata.container.tags | join(",")')

            if [ "$TAGS" = "null" ] || [ -z "$TAGS" ]; then
              SHOULD_DELETE=1
            else
              SHOULD_DELETE=1
              if echo "$TAGS" | grep -q "$KEEP_TAG_1"; then
                SHOULD_DELETE=0
              fi
              if [ "$SHOULD_DELETE" -eq 1 ] && [ -n "$KEEP_TAG_2" ] && echo "$TAGS" | grep -q "$KEEP_TAG_2"; then
                SHOULD_DELETE=0
              fi
            fi

            echo "Version ID=${ID}, created_at=${CREATED_AT}, tags=[${TAGS}]"

            if [ "$SHOULD_DELETE" -eq 1 ]; then
              echo "  -> Deleting this version"
              curl -sS -X DELETE \
                -H "Authorization: Bearer $GH_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                "${API_ROOT}/user/packages/container/${SERVICE}/versions/${ID}" || echo "  вҡ пёҸ Failed to delete version ${ID}"
            else
              echo "  -> Keeping this version"
            fi
          done

