name: Kafka Deploy (Helm)

on:
  push:
    branches:
      - main
      - feature/issue-90-deploy-infra(db)-k8s
    paths:
      - 'k8s/infra/**'
      - '.github/workflows/kafka-deploy.yml'
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-2
  K8S_NAMESPACE: kafka
  KAFKA_RELEASE_NAME: my-kafka

jobs:
  deploy-kafka:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v3

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Set up kubeconfig
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > kubeconfig
          echo "KUBECONFIG=$(pwd)/kubeconfig" >> $GITHUB_ENV

      - name: Create namespace
        run: |
          kubectl --insecure-skip-tls-verify create namespace ${{ env.K8S_NAMESPACE }} --dry-run=client -o yaml | \
            kubectl --insecure-skip-tls-verify apply -f -

      - name: Deploy / Upgrade Kafka (bitnami Kafka KRaft via Helm)
        run: |
          helm upgrade --install ${{ env.KAFKA_RELEASE_NAME }} \
            oci://registry-1.docker.io/bitnamicharts/kafka \
            --version 32.4.3 \
            --namespace ${{ env.K8S_NAMESPACE }} \
            --create-namespace \
            -f k8s/infra/kafka/values-kafka.yaml
