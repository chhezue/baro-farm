name: Kafka Deploy (Helm)

on:
  push:
    branches:
      - main
      - feature/issue-99-refactor-configmap
    paths:
      - 'k8s/infra/**'
      - '.github/workflows/kafka-deploy.yml'
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-2
  K8S_NAMESPACE: kafka
  KAFKA_RELEASE_NAME: my-kafka

jobs:
  deploy-kafka:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v3

      - name: Set up kubeconfig
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > kubeconfig
          echo "KUBECONFIG=$(pwd)/kubeconfig" >> $GITHUB_ENV

      - name: Create namespace
        run: |
          kubectl --insecure-skip-tls-verify create namespace ${{ env.K8S_NAMESPACE }} --dry-run=client -o yaml | \
            kubectl --insecure-skip-tls-verify apply -f -

      - name: Install Strimzi Operator
        run: |
          kubectl --insecure-skip-tls-verify apply \
            -f "https://strimzi.io/install/latest?namespace=${{ env.K8S_NAMESPACE }}" \
            -n ${{ env.K8S_NAMESPACE }}

      - name: Deploy / Upgrade Kafka (Strimzi)
        run: |
          # Clean up any old incompatible Kafka CRs to avoid patch errors
          kubectl --insecure-skip-tls-verify delete kafka my-kafka -n ${{ env.K8S_NAMESPACE }} --ignore-not-found
          kubectl --insecure-skip-tls-verify delete kafkanodepool my-kafka-pool -n ${{ env.K8S_NAMESPACE }} --ignore-not-found

          kubectl --insecure-skip-tls-verify apply \
            -f k8s/infra/kafka/strimzi-kafka.yml \
            -n ${{ env.K8S_NAMESPACE }}
          kubectl --insecure-skip-tls-verify wait kafka/my-kafka \
            --for=condition=Ready --timeout=300s -n ${{ env.K8S_NAMESPACE }}
