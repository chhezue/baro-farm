name: Elasticsearch Deploy (Helm)

on:
  push:
    branches:
      - main
    paths:
      - 'k8s/infra/elasticsearch/**'
      - '.github/workflows/elasticsearch-deploy.yml'
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-2
  K8S_NAMESPACE: search

jobs:
  deploy-elasticsearch:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v3

      - name: Set up kubeconfig
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > kubeconfig
          echo "KUBECONFIG=$(pwd)/kubeconfig" >> $GITHUB_ENV

      - name: Create namespace
        run: |
          kubectl --insecure-skip-tls-verify create namespace ${{ env.K8S_NAMESPACE }} --dry-run=client -o yaml | \
            kubectl --insecure-skip-tls-verify apply -f -

      - name: Cleanup old Helm-based Elasticsearch (if any)
        run: |
          helm uninstall my-elasticsearch -n ${{ env.K8S_NAMESPACE }} || true
          kubectl --insecure-skip-tls-verify delete statefulset my-elasticsearch -n ${{ env.K8S_NAMESPACE }} --ignore-not-found
          kubectl --insecure-skip-tls-verify delete svc my-elasticsearch -n ${{ env.K8S_NAMESPACE }} --ignore-not-found

      - name: Deploy / Upgrade Elasticsearch (StatefulSet)
        run: |
          kubectl --insecure-skip-tls-verify apply \
            -f k8s/infra/elasticsearch/elasticsearch.yml \
            -n ${{ env.K8S_NAMESPACE }}
          kubectl --insecure-skip-tls-verify rollout status statefulset/my-elasticsearch \
            -n ${{ env.K8S_NAMESPACE }} --timeout=300s
