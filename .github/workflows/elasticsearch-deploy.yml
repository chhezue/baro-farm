name: Elasticsearch Deploy (Helm)

on:
  push:
    branches:
      - main
      - feature/issue-90-deploy-infra(db)-k8s
    paths:
      - 'k8s/infra/elasticsearch/**'
      - '.github/workflows/elasticsearch-deploy.yml'
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-2
  K8S_NAMESPACE: search
  ES_RELEASE_NAME: my-elasticsearch

jobs:
  deploy-elasticsearch:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v3

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Set up kubeconfig
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > kubeconfig
          echo "KUBECONFIG=$(pwd)/kubeconfig" >> $GITHUB_ENV

      - name: Create namespace
        run: |
          kubectl --insecure-skip-tls-verify create namespace ${{ env.K8S_NAMESPACE }} --dry-run=client -o yaml | \
            kubectl --insecure-skip-tls-verify apply -f -

      - name: Add Bitnami repo
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo update

      - name: Deploy / Upgrade Elasticsearch (Bitnami Helm)
        run: |
          # Retry a few times in case Docker Hub / OCI registry returns transient 5xx
          for i in 1 2 3; do
            if helm upgrade --install ${{ env.ES_RELEASE_NAME }} bitnami/elasticsearch \
              --namespace ${{ env.K8S_NAMESPACE }} \
              --create-namespace \
              -f k8s/infra/elasticsearch/values-elasticsearch.yaml; then
              break
            fi
            echo "Helm install failed (attempt $i), retrying in 10s..."
            sleep 10
          done

          kubectl --insecure-skip-tls-verify rollout status statefulset/${{ env.ES_RELEASE_NAME }}-master \
            -n ${{ env.K8S_NAMESPACE }} --timeout=300s
