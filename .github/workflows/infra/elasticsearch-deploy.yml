name: Elasticsearch Build & Deploy (ECR + Helm)

on:
  push:
    branches:
      ## ArgoCD 배포 전환으로 인해 주석처리, workflow 실행 안됨.
      ## - main
    paths:
      - 'docker/elasticsearch/**'
      - 'k8s/infra/elasticsearch/**'
      - '.github/workflows/infra/elasticsearch-deploy.yml'
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-2
  K8S_NAMESPACE: search
  ECR_REGISTRY: 299369991605.dkr.ecr.ap-northeast-2.amazonaws.com
  ECR_REPOSITORY: baro-prod/elasticsearch-nori

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names ${{ env.ECR_REPOSITORY }} >/dev/null 2>&1 || \
          aws ecr create-repository --repository-name ${{ env.ECR_REPOSITORY }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Elasticsearch nori image
        env:
          IMAGE_URI: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
        run: |
          docker build -f docker/elasticsearch/Dockerfile -t $IMAGE_URI .
          docker push $IMAGE_URI

      - name: Install kubectl
        uses: azure/setup-kubectl@v3

      - name: Set up kubeconfig
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > kubeconfig
          echo "KUBECONFIG=$(pwd)/kubeconfig" >> $GITHUB_ENV

      - name: Create namespace
        run: |
          kubectl --insecure-skip-tls-verify create namespace ${{ env.K8S_NAMESPACE }} --dry-run=client -o yaml | \
            kubectl --insecure-skip-tls-verify apply -f -

      - name: Create ECR image pull secret
        run: |
          kubectl --insecure-skip-tls-verify create secret docker-registry ecr-registry \
            --docker-server=${{ env.ECR_REGISTRY }} \
            --docker-username=AWS \
            --docker-password="$(aws ecr get-login-password --region ${{ env.AWS_REGION }})" \
            -n ${{ env.K8S_NAMESPACE }} \
            --dry-run=client -o yaml | kubectl --insecure-skip-tls-verify apply -f -

      - name: Cleanup old Elasticsearch resources (for immutable selector changes)
        run: |
          kubectl --insecure-skip-tls-verify delete deployment my-elasticsearch -n ${{ env.K8S_NAMESPACE }} --ignore-not-found
          kubectl --insecure-skip-tls-verify delete statefulset my-elasticsearch-master -n ${{ env.K8S_NAMESPACE }} --ignore-not-found
          kubectl --insecure-skip-tls-verify delete svc my-elasticsearch-master-hl -n ${{ env.K8S_NAMESPACE }} --ignore-not-found
          kubectl --insecure-skip-tls-verify delete svc my-elasticsearch -n ${{ env.K8S_NAMESPACE }} --ignore-not-found

      - name: Deploy / Upgrade Elasticsearch (single pod)
        run: |
          kubectl --insecure-skip-tls-verify apply \
            -f k8s/infra/elasticsearch/elasticsearch.yml \
            -n ${{ env.K8S_NAMESPACE }}

          kubectl --insecure-skip-tls-verify rollout status deployment/my-elasticsearch \
            -n ${{ env.K8S_NAMESPACE }} --timeout=300s
