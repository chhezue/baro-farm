name: MySQL Deploy (Helm + EBS)

on:
  push:
    branches:
      - main
      - feature/issue-90-deploy-infra(db)-k8s
    paths:
      - 'k8s/infra/**'
      - '.github/workflows/mysql-deploy.yml'
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-2
  K8S_NAMESPACE: db
  MYSQL_RELEASE_NAME: my-mysql

jobs:
  deploy-mysql:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v3

      - name: Set up kubeconfig
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > kubeconfig
          echo "KUBECONFIG=$(pwd)/kubeconfig" >> $GITHUB_ENV

      - name: Apply StorageClass (gp3-ebs)
        run: |
          kubectl --insecure-skip-tls-verify apply -f k8s/infra/storageclass-gp3-ebs.yaml

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Add Bitnami repo
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo update

      - name: Deploy / Upgrade MySQL
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_APP_PASSWORD: ${{ secrets.MYSQL_APP_PASSWORD }}
        run: |
          kubectl --insecure-skip-tls-verify create namespace ${{ env.K8S_NAMESPACE }} --dry-run=client -o yaml | \
            kubectl --insecure-skip-tls-verify apply -f -

          helm upgrade --install ${{ env.MYSQL_RELEASE_NAME }} bitnami/mysql \
            -n ${{ env.K8S_NAMESPACE }} \
            -f k8s/infra/mysql/values-mysql.yaml \
            --set auth.rootPassword=$MYSQL_ROOT_PASSWORD \
            --set auth.password=$MYSQL_APP_PASSWORD \
            --set global.security.allowInsecureImages=true
