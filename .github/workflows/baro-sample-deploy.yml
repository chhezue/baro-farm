name: baro-sample Deploy (ECR + ArgoCD)

on:
  push:
    branches:
      - main
    paths:
      - 'baro-sample/**'
      - 'docker/baro-sample/**'
      - 'k8s/apps/baro-sample/**'
      - '.github/workflows/baro-sample-deploy.yml'

env:
  AWS_REGION: ap-northeast-2
  ECR_REGISTRY: 299369991605.dkr.ecr.ap-northeast-2.amazonaws.com
  ECR_REPOSITORY: baro-prod/baro-sample
  K8S_NAMESPACE: default

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build JAR
        run: ./gradlew :baro-sample:bootJar --no-daemon

      - name: Set image tag
        id: image-tag
        run: echo "tag=sha-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          IMAGE_TAG: ${{ steps.image-tag.outputs.tag }}
          IMAGE_URI: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ steps.image-tag.outputs.tag }}
        run: |
          docker build -f docker/baro-sample/Dockerfile -t $IMAGE_URI -t ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest .
          docker push $IMAGE_URI
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest

      - name: Update deployment image tag
        env:
          IMAGE_TAG: ${{ steps.image-tag.outputs.tag }}
        run: |
          sed -i "s#image: ${ECR_REGISTRY}/${ECR_REPOSITORY}:.*#image: ${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}#g" k8s/apps/baro-sample/deployment.yml

      - name: Commit and push updated deployment
        env:
          IMAGE_TAG: ${{ steps.image-tag.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/apps/baro-sample/deployment.yml
          git commit -m "chore(baro-sample): update image tag to ${IMAGE_TAG}" || echo "No changes to commit"
          git pull --rebase origin main
          git push
