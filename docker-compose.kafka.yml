services:
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: baro-kafka
    # init: true - tini를 PID 1로 실행하여 zombie 프로세스 방지
    # tini가 모든 자식 프로세스의 종료 상태를 수집(wait)하여 zombie 발생 방지
    init: true
    ports:
      - "29092:29092"  # Broker listener (외부 접근용) - 컨테이너 내부 29092 → 호스트 29092
      # 9093은 Controller listener로 카프카 내부 통신용이므로 외부 노출 불필요
    environment:
      # KRaft 모드 설정
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@baro-kafka:29093
      # CLUSTER_ID는 기존 볼륨에 저장된 값을 사용 (변경 시 데이터 손실)
      # 새로 초기화하려면 .env에서 다른 값으로 설정
      KAFKA_CLUSTER_ID: ${KAFKA_CLUSTER_ID:-}
      CLUSTER_ID: ${KAFKA_CLUSTER_ID:-}

      # Listeners 설정
      # KAFKA_ADVERTISED_LISTENERS: 클라이언트가 Kafka에 연결할 때 사용하는 주소
      # - Public EC2에 배포 시: Public EC2의 IP 사용 (다른 EC2에서 접근 가능)
      # - Private EC2에 배포 시: 127.0.0.1 사용 (같은 EC2 내에서만 접근)
      # 컨테이너 내부에서 0.0.0.0으로 리스닝하여 호스트에서 접근 가능하도록 설정
      # INTERNAL: 컨테이너 간 통신용, EXTERNAL: 호스트/로컬 테스트용
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://baro-kafka:9092,EXTERNAL://localhost:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      # 토픽 설정
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

      # 로그 설정
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      # 메모리 제한
      KAFKA_HEAP_OPTS: -Xms192m -Xmx256m
    # deploy:
    #   resources:
    #     limits:
    #       memory: 512M
    #     reservations:
    #       memory: 256M
    volumes:
      - kafka-data:/var/lib/kafka/data
      - ${S3_MOUNT_PATH:-/mnt/s3}:/mnt/s3:rw
    restart: unless-stopped
    networks:
      - baro-network
    healthcheck:
      # init: true로 tini가 PID 1로 실행되어 모든 자식 프로세스의 종료 상태를 수집
      # CMD 사용으로 shell 없이 직접 실행 (추가 안전장치)
      # interval을 30s로 늘려 healthcheck 빈도 감소
      # 카프카는 29092 포트로 리스닝하므로 healthcheck도 동일한 포트 사용
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:29092"]
      interval: 60s
      timeout: 5s
      retries: 10
      start_period: 40s

volumes:
  kafka-data:
    driver: local

networks:
  baro-network:
    name: be_baro-network
    external: true
