server:
  port: ${BARO_GATEWAY_PORT:8080}

spring:
  application:
    name: gateway-service
  config:
    import: ${BARO_GATEWAY_CONFIG_IMPORT:optional:configserver:http://localhost:8888}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  http:
    codecs:
      max-in-memory-size: 2MB

  cloud:
    gateway:
      server:
        webflux:
          metrics:
            enabled: true
          httpclient:
            connect-timeout: 5000
            response-timeout: 5s
            # 디버깅용: 게이트웨이->백엔드 요청/응답 로그를 보기 위해 wiretap 활성화
            # 필요 없으면 false로 되돌리거나 제거하세요.
            wiretap: false
            pool:
              type: elastic
              maxConnections: 200
              acquireTimeout: 2000
              maxIdleTime: 30s
              maxLifeTime: 300s
              pendingAcquireMaxCount: 500
              metrics: true
          httpserver:
            max-header-size: 16KB
            max-initial-line-length: 8KB
            max-chunk-size: 8KB
            # 디버깅용: 클라이언트->게이트웨이 요청/응답 로그를 보기 위해 wiretap 활성화
            # 필요 없으면 false로 되돌리거나 제거하세요.
            wiretap: false
          default-filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 50
                redis-rate-limiter.burstCapacity: 100
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@gatewayKeyResolver}"
            - name: Retry
              args:
                retries: 2
                methods: GET
                statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE,GATEWAY_TIMEOUT
                backoff:
                  firstBackoff: 50ms
                  maxBackoff: 500ms
                  factor: 2
                  basedOnPreviousValue: true
            - name: CircuitBreaker
              args:
                name: gatewayCircuitBreaker
                fallbackUri: forward:/fallback
          globalcors:
            corsConfigurations:
              '[/**]': # 모든 경로에 대해 CORS 허용
                allowedOrigins:
                  - ${GATEWAY_ALLOWED_ORIGIN_0:http://localhost:3001}
                  - ${GATEWAY_ALLOWED_ORIGIN_1:http://localhost:3000}
                allowedMethods: "*"   # 허용 HTTP 메서드 (GET/POST/PUT/DELETE 등)
                allowedHeaders: "*"   # 허용 요청 헤더 (Authorization 등)
                allowCredentials: true # 쿠키/인증 헤더 전달 허용 시 true
                maxAge: 3600          # 프리플라이트(OPTIONS) 결과를 캐시할 시간(초)
#          discovery:
#            locator:
#              enabled: true
#              lower-case-service-id: true
          routes:
            - id: user-service-route
              uri: http://localhost:${BARO_USER_PORT:8087}          # IDE에서 실행 중인 baro-user
              predicates:
                - Path=/user-service/**
              filters:
                - RewritePath=/user-service/(?<seg>.*), /${seg}

            - id: order-service-route
              uri: http://localhost:${BARO_ORDER_PORT:8083}          # IDE에서 실행 중인 baro-order
              predicates:
                - Path=/order-service/**
              filters:
                - RewritePath=/order-service/(?<seg>.*), /${seg}
                - AuthenticationFilter

            - id: payment-service-route
              uri: http://localhost:${BARO_PAYMENT_PORT:8084}          # IDE에서 실행 중인 baro-payment
              predicates:
                - Path=/payment-service/**
              filters:
                - RewritePath=/payment-service/(?<seg>.*), /${seg}
                - AuthenticationFilter

            - id: shopping-service-route
              uri: http://localhost:${BARO_SHOPPER_PORT:8086}          # IDE에서 실행 중인 baro-shopper
              predicates:
                - Path=/shopping-service/**
              filters:
                - RewritePath=/shopping-service/(?<seg>.*), /${seg}
                - AuthenticationFilter

            - id: notification-service-route
              uri: http://localhost:${BARO_NOTIFICATION_PORT:8082}          # IDE에서 실행 중인 baro-notification
              predicates:
                - Path=/notification-service/**
              filters:
                - RewritePath=/notification-service/(?<seg>.*), /${seg}
                - AuthenticationFilter

            - id: settlement-service-route
              uri: http://localhost:${BARO_SETTLEMENT_PORT:8085}          # IDE에서 실행 중인 baro-settlement
              predicates:
                - Path=/settlement-service/**
              filters:
                - RewritePath=/settlement-service/(?<seg>.*), /${seg}
                - AuthenticationFilter

            - id: ai-service-route
              uri: http://localhost:${BARO_AI_PORT:8081}          # IDE에서 실행 중인 baro-ai
              predicates:
                - Path=/ai-service/**
              filters:
                - RewritePath=/ai-service/(?<seg>.*), /${seg}
                - AuthenticationFilter

