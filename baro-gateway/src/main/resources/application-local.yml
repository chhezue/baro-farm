jwt:
  secret: "너무_짧지_않은_랜덤_시크릿_문자열_최소32바이트_나중에_env로_옮길예정"

management:
  metrics:
    tags:
      application: ${spring.application.name}
  endpoints:
    web:
      exposure:
        include: health, info, gateway, metrics, prometheus

resilience4j:
  circuitbreaker:
    instances:
      gatewayCircuitBreaker:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 50
        minimumNumberOfCalls: 20
        failureRateThreshold: 50
        slowCallRateThreshold: 50
        slowCallDurationThreshold: 2s
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 10
      opaAuthz:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 30
        minimumNumberOfCalls: 10
        failureRateThreshold: 50
        slowCallRateThreshold: 50
        slowCallDurationThreshold: 1s
        waitDurationInOpenState: 5s
        permittedNumberOfCallsInHalfOpenState: 5
  bulkhead:
    instances:
      opaAuthz:
        maxConcurrentCalls: 50
        maxWaitDuration: 0


# 이 부분 수정
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    use-root-path: false  # 여기로 이동
    urls:
      - name: Auth Service
        url: /openapi/auth/v3/api-docs
  api-docs:
    enabled: true
  enable-native-support: true

logging:
  level:
    # 디버깅용: 인증/OPA 필터 동작 및 라우팅 흐름 확인
    com.barofarm.gateway.filter: DEBUG
    # 디버깅용: 게이트웨이 라우팅/필터 체인 로그
    org.springframework.cloud.gateway: DEBUG
    # 디버깅용: Netty 레벨 요청/응답 트레이스
    reactor.netty: INFO
    reactor.netty.http.server: INFO
    reactor.netty.http.client: INFO
    reactor.netty.http.server.HttpServer: INFO
    reactor.netty.http.server.HttpServerOperations: INFO
