# docker-compose.data.yml
# 개발 환경: IntelliJ 앱들이 localhost:포트 로 접속

services:
  # ═══════════════════════════════════════
  # MySQL
  # ═══════════════════════════════════════
  mysql:
    image: mysql:8.0
    container_name: baro-mysql
    ports:
      - "3306:3306"       # ← IntelliJ 앱이 localhost:3306 으로 접속
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: baro_shopping
      MYSQL_USER: barouser
      MYSQL_PASSWORD: baropassword
    volumes:
      - mysql-data:/var/lib/mysql
      - ./scripts/init-db:/docker-entrypoint-initdb.d
    command: >
      --innodb-buffer-pool-size=128M
      --max-connections=100
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    restart: unless-stopped
    networks:
      - baro-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-ubarouser", "-pbaropassword"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ═══════════════════════════════════════
  # Redis
  # ═══════════════════════════════════════
  redis:
    image: redis:7.2-alpine
    container_name: baro-redis
    ports:
      - "6379:6379"       # ← IntelliJ 앱이 localhost:6379 으로 접속
    command: >
      redis-server
      --appendonly yes
      --requirepass redis123
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - baro-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis123", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ═══════════════════════════════════════
  # Kafka (KRaft 모드)
  # ═══════════════════════════════════════
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: baro-kafka
    ports:
      - "9092:9092"       # ← IntelliJ 앱이 localhost:9092 로 접속 (외부용)
      # 29092는 컨테이너 내부 통신용이므로 노출 불필요
    environment:
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093

      # ★ 핵심 설정: 리스너를 두 개로 분리
      # INTERNAL: 컨테이너끼리 통신할 때 (docker 네트워크 내부)
      # EXTERNAL: IntelliJ 앱(호스트)이 접속할 때
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://baro-kafka:29092,EXTERNAL://localhost:9092
      #                                      ↑ 컨테이너끼리는 이 주소로    ↑ 호스트 앱은 이 주소로
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL # 현재 단일 노드라 큰 의미는 없지만 설정값이 있어야 정상 작동
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER # 컨트롤러 전용 리스터 명시

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_HEAP_OPTS: -Xmx512m -Xms256m
    volumes:
      - kafka-data:/var/lib/kafka/data
    restart: unless-stopped
    networks:
      - baro-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ═══════════════════════════════════════
  # Elasticsearch
  # ═══════════════════════════════════════
  elasticsearch:
    image: elasticsearch:8.12.0
    container_name: baro-elasticsearch
    ports:
      - "9200:9200"       # ← IntelliJ 앱이 localhost:9200 으로 접속 (HTTP API)
      - "9300:9300"       # ← 클러스터 내부 통신 (단일 노드면 불필요하지만 관행상)
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false   # 개발환경에서는 보안 비활성화
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - cluster.name=baro-cluster
      - node.name=baro-es-node
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    ulimits:
      memlock:
        soft: -1  # 소프트 제한: 프로세스가 일시적으로 초과 가능한 한계
        hard: -1  # 하드 제한: 절대 초과 불가능한 한계
                  # -1 = 무제한
    restart: unless-stopped
    networks:
      - baro-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local
  kafka-data:
    driver: local
  elasticsearch-data:
    driver: local

networks:
  baro-network:
    name: be_baro-network
    external: true
