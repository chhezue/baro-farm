server:
  port: ${SERVER_PORT:8082}  # нҷҳкІҪ ліҖмҲҳлЎң мҳӨлІ„лқјмқҙл“ң к°ҖлҠҘ (Config Server м„Өм • лҚ®м–ҙм“°кё° л°©м§Җ)

api:
  v1: /api/v1

spring:
  application:
    name: buyer-service
  config:
    import: ${SPRING_CONFIG_IMPORT:optional:configserver:http://config:8888}
  main:
    allow-bean-definition-overriding: true
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://baro-mysql:3306/${MYSQL_DATABASE:-barobuyer}?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true&useUnicode=true}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${MYSQL_USER:barouser}
    password: ${MYSQL_PASSWORD:baroUser123!!123!!}
  jpa:
    hibernate:
      ddl-auto: update  # мқјмӢңм ҒмңјлЎң updateлЎң ліҖкІҪ (мҠӨнӮӨл§Ҳ мҲҳм • нӣ„ validateлЎң ліҖкІҪ)
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
        use_sql_comments: true

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    consumer:
      group-id: support-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.type.mapping: productEvent:com.barofarm.support.event.ProductEvent
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.barofarm.support.event.ProductEvent
      auto-offset-reset: latest  # earliestм—җм„ң latestлЎң ліҖкІҪн•ҳм—¬ мҳӨлһҳлҗң л©”мӢңм§Җ кұҙл„Ҳлӣ°кё°
      # auto-offset-reset: earliest
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

eureka:
  client:
    # Eureka м„ңлІ„м—җ л“ұлЎқ (Config Serverмқҳ eureka-server м„Өм •кіј м¶©лҸҢ л°©м§Җ)
    register-with-eureka: true
    fetch-registry: true
    service-url:
      # Docker нҷҳкІҪм—җм„ңлҠ” м„ңл№„мҠӨ мқҙлҰ„(eureka) мӮ¬мҡ©, лЎңм»¬м—җм„ңлҠ” localhost мӮ¬мҡ©
      # нҷҳкІҪ ліҖмҲҳ EUREKA_CLIENT_SERVICEURL_DEFAULTZONEмңјлЎң мҳӨлІ„лқјмқҙл“ң к°ҖлҠҘ
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://eureka:8761/eureka/}
  instance:
    prefer-ip-address: true

# Eureka лӘ…мӢңм Ғ л№„нҷңм„ұнҷ”
# eureka:
#   client:
#     enabled: false
#     register-with-eureka: false
#     fetch-registry: false
#   instance:
#     enabled: false

# лЎңк№… м„Өм •
logging:
  level:
    root: INFO
    com.barofarm.buyer: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.hibernate.orm.jdbc.bind: TRACE
    org.springframework.web: DEBUG
    org.springframework.web.servlet.DispatcherServlet: DEBUG

# Actuator м„Өм •
management:
  endpoints:
    web:
      exposure:
        include: refresh, health, beans, info
  endpoint:
    health:
      enabled: true
      show-details: always

# History logging settings
history:
  log:
    ai-topic: ai-history
    user-id-header: X-User-Id

# Swagger/OpenAPI м„Өм •
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  default-consumes-media-type: application/json
  default-produces-media-type: application/json

# AWS л°Ҹ S3 м„Өм •
cloud:
  aws:
    s3:
      enabled: true
      log-upload:
        enabled: true
      bucket: ${AWS_S3_BUCKET_NAME}
      public-base-url: https://${AWS_S3_BUCKET_NAME}.s3.ap-northeast-2.amazonaws.com
    credentials:
      access-key: ${AWS_ACCESS_KEY}
      secret-key: ${AWS_SECRET_KEY}
    region: ap-northeast-2
