server:
  port: ${SERVER_PORT:${BARO_SHOPPING_PORT:8082}}

api:
  v1: /api/v1

spring:
  application:
    name: shopping-service
  main:
    allow-bean-definition-overriding: true
  config:
    import: ${SPRING_CONFIG_IMPORT:optional:configserver:http://baro-config:8888}
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB
  datasource:
    url: ${SPRING_DATASOURCE_URL:${BARO_SHOPPING_DATASOURCE_URL:jdbc:mysql://my-mysql.db.svc.cluster.local:3306/baro_shopping?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true&useUnicode=true}}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${SPRING_DATASOURCE_USERNAME:${BARO_SHOPPING_DB_USERNAME:}}
    password: ${SPRING_DATASOURCE_PASSWORD:${BARO_SHOPPING_DB_PASSWORD:}}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
        use_sql_comments: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:${BARO_SHOPPING_KAFKA_BOOTSTRAP_SERVERS:my-kafka-kafka-bootstrap.kafka.svc.cluster.local:9092}}
    consumer:
      group-id: shopping-service # 재고 관련 토픽 구독, 리뷰 요약 반영
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: latest
      properties:
        spring.json.trusted.packages: "com.barofarm.shopping.*"
        spring.json.use.type.headers: false
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

eureka:
  client:
    enabled: false

management:
  metrics:
    tags:
      application: ${spring.application.name}
  endpoints:
    web:
      exposure:
        include: refresh, health, beans, info, metrics, prometheus
  endpoint:
    health:
      show-details: always
      enabled: true

# History / Kafka 토픽 (AI 연동)
history:
  log:
    enabled: true
    ai-topic: ai-history
    cart-topic: cart-events
    order-topic: order-events
    user-id-header: X-User-Id

# Swagger/OpenAPI 설정
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  default-consumes-media-type: application/json
  default-produces-media-type: application/json

# AWS S3 (baro-common AwsProperties: cloud.aws) — K8s에서는 ConfigMap/Secret으로 주입
cloud:
  aws:
    s3:
      enabled: true
      log-upload:
        enabled: true
      bucket: ${AWS_S3_BUCKET_NAME}
      public-base-url: https://${AWS_S3_BUCKET_NAME}.s3.ap-northeast-2.amazonaws.com
    credentials:
      access-key: ${AWS_ACCESS_KEY}
      secret-key: ${AWS_SECRET_KEY}
    region: ap-northeast-2

logging:
  level:
    root: INFO
    com.barofarm.shopping: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.kafka: DEBUG
    org.apache.kafka.clients.producer: INFO
