server:
  port: ${SERVER_PORT:8090}

spring:
  application:
    name: baro-sample

api:
  v1: /api/v1

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      enabled: true
      show-details: always

logging:
  level:
    root: INFO
    com.barofarm.sample: DEBUG
