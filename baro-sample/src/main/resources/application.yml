server:
  port: ${SERVER_PORT:8090}

spring:
  application:
    name: baro-sample
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/baro_db}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 5
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

api:
  v1: /api/v1

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      enabled: true
      show-details: always

logging:
  level:
    root: INFO
    com.barofarm.sample: DEBUG
