server:
  port: ${BARO_USER_PORT:8087}

api:
  v1: /api/v1

spring:
  application:
    name: user-service
  config:
    import: ${BARO_USER_CONFIG_IMPORT:optional:configserver:http://localhost:8888}
  main:
    allow-bean-definition-overriding: true
  datasource:
    url: ${BARO_USER_DATASOURCE_URL:jdbc:mysql://localhost:3307/baro_user?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true&useUnicode=true}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${BARO_USER_DB_USERNAME:}
    password: ${BARO_USER_DB_PASSWORD:}
  kafka:
    bootstrap-servers: ${BARO_USER_KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    consumer:
      group-id: user-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: latest
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  mail:
    host: smtp.naver.com
    port: 465
    username: ${BARO_USER_MAIL_USERNAME:}
    password: ${BARO_USER_MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.ssl.enable: true
      mail.smtp.ssl.trust: smtp.naver.com

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
      enabled: true

jwt:
  secret: "${BARO_USER_JWT_SECRET:replace-with-secure-secret-key-min-32-bytes}"
  access-token-validity-ms: 604800000
  refresh-token-validity-ms: 1209600000

auth:
  cookie:
    access-name: access_token
    refresh-name: refresh_token
    secure: ${BARO_USER_AUTH_COOKIE_SECURE:true}
    same-site: Strict
    path: /
    domain: ${BARO_USER_AUTH_COOKIE_DOMAIN:}
  kafka:
    topic:
      user-events: ${BARO_USER_AUTH_USER_EVENTS_TOPIC:user-events}
  outbox:
    publish-interval-ms: ${BARO_USER_AUTH_OUTBOX_PUBLISH_INTERVAL_MS:1000}
    max-attempts: ${BARO_USER_AUTH_OUTBOX_MAX_ATTEMPTS:5}

oauth:
  naver:
    client-id: ${BARO_USER_NAVER_CLIENT_ID:}
    client-secret: ${BARO_USER_NAVER_CLIENT_SECRET:}
    redirect-uri: ${BARO_USER_NAVER_REDIRECT_URI:http://localhost:8087/api/v1/auth/oauth/callback?provider=naver}
    token-uri: ${BARO_USER_NAVER_TOKEN_URI:https://nid.naver.com/oauth2.0/token}
    user-info-uri: ${BARO_USER_NAVER_USERINFO_URI:https://openapi.naver.com/v1/nid/me}
  kakao:
    client-id: ${BARO_USER_KAKAO_CLIENT_ID:}
    client-secret: ${BARO_USER_KAKAO_CLIENT_SECRET:}
    redirect-uri: ${BARO_USER_KAKAO_REDIRECT_URI:http://localhost:8087/api/v1/auth/oauth/callback?provider=kakao}
    token-uri: ${BARO_USER_KAKAO_TOKEN_URI:https://kauth.kakao.com/oauth/token}
    user-info-uri: ${BARO_USER_KAKAO_USERINFO_URI:https://kapi.kakao.com/v2/user/me}

opa:
  kafka:
    topic: ${BARO_USER_OPA_HOTLIST_TOPIC:opa-hotlist-events}
